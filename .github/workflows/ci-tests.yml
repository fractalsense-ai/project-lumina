name: CI Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m spacy download en_core_web_sm

      - name: Secret hygiene check
        shell: pwsh
        run: ./scripts/check-local-secret-hygiene.ps1

      - name: Backend tests + coverage gate (>=85%)
        run: >
          python -m pytest tests -q
          --cov=lumina
          --cov-report=term-missing
          --cov-fail-under=85

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/web
        run: npm ci

      - name: Frontend unit tests
        working-directory: src/web
        run: npm run test:unit

      - name: Frontend coverage report (non-blocking)
        working-directory: src/web
        run: npm run test:coverage
        continue-on-error: true

      - name: Install Playwright browser
        working-directory: src/web
        run: npm exec playwright install chromium

      - name: Frontend e2e smoke tests
        working-directory: src/web
        run: npm run test:e2e
