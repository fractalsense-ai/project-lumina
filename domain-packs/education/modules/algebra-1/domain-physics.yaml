# Algebra 1 Domain Pack — Grade 9
# Version: 0.1.0
# Conforms to: lumina-core-v1.0.0
# ============================================================
# Diagnostic Law Coverage:
#   Law 1 — Balance Principle (equivalence_preserved):       CRITICAL  (inherited)
#   Law 2 — Inverse Operations (reversibility):              WARNING   (inherited)
#   Law 3 — Interchangeability/Substitution:                 WARNING   (inherited)
#   Law 4 — Structure Preservation (distribute/factor):      WARNING   (new — LLM-estimated)
#   Law 5 — Relational Mapping (functions/rates):            WARNING   (inherited)
#   Law 6 — Abstraction/Translation (word problems):         WARNING   (new — LLM-estimated)
# ============================================================
# All 6 diagnostic laws are active in this module.
# Curriculum position: Artifacts 11–15 of 15 (full sequence)
# Prerequisite: domain/edu/algebra-intro/v1 — all 5 artifacts passed
# ============================================================

id: domain/edu/algebra-1/v1
version: "0.1.0"

domain_authority:
  name: "Lead Algebra 1 Teacher"
  role: "Teacher"
  pseudonymous_id: "da_algebra1_lead_001"

meta_authority_id: domain/edu/curriculum/v1

description: >
  Algebra 1 for grade 9. All 6 diagnostic laws are active for the first time.
  Extends Algebra Intro (domain/edu/algebra-intro/v1) by activating Law 4
  (Structure Preservation — factoring and distribution) and Law 6 (Abstraction/
  Translation — converting real-world constraints into algebraic equations).
  Covers exponent rules, polynomial operations, factoring quadratics, quadratic
  graphs and the vertex form, and solving quadratic equations (Artifacts 11–15 in
  the full 15-artifact curriculum). The sensor runs at full diagnostic capacity.
  Prerequisite: Algebra Intro (domain/edu/algebra-intro/v1).

lumina_core_version: "1.0.0"

# ── Invariants ───────────────────────────────────────────────

invariants:

  # === CRITICAL INVARIANTS ===

  - id: equivalence_preserved
    description: >
      Law 1 (Balance Principle): both sides of every equation must remain
      algebraically equal after each transformation. In quadratic solving this
      means every manipulation — completing the square, isolating terms, applying
      the quadratic formula — must be applied symmetrically. Students who move
      a term to one side without subtracting it from the other are still making
      the foundational Law 1 error even in Grade 9 work.
    severity: critical
    check: "equivalence_preserved"
    standing_order_on_violation: request_more_steps

  - id: no_illegal_operations
    description: >
      Division by zero or any undefined operation is not permitted. Includes
      taking the square root of a negative discriminant without acknowledging
      complex/no-real-solution context.
    severity: critical
    check: "illegal_operations == []"
    standing_order_on_violation: request_more_steps

  - id: solution_verifies
    description: >
      Every proposed solution or factored form must be verified. For quadratic
      equations: substitute each root back into the original equation and confirm
      it equals zero. For factored forms: expand the factors and confirm the
      result matches the original polynomial.
    severity: critical
    check: "substitution_check"
    standing_order_on_violation: request_verification_retry

  # === WARNING INVARIANTS (inherited) ===

  - id: reversibility_order_correct
    description: >
      Law 2 (Inverse Operations): inverse operations applied in correct
      reversed-PEMDAS order. Inherited; remains active when isolating x in
      quadratic equations (e.g. after applying the square root to both sides
      of x² = k). NOTE: LLM-estimated; deterministic tool_adapter support
      planned for module v0.2.
    severity: warning
    check: "reversibility_order_correct"
    standing_order_on_violation: hint_reverse_order_of_operations

  - id: substitution_valid
    description: >
      Law 3 (Interchangeability): when a factored form is known, it is a
      binding identity for the original expression everywhere. Inherited from
      Algebra Intro. Active during the verify-by-expanding step of factoring
      (Artifact 13) and when substituting roots back into the original equation.
      NOTE: LLM-estimated; deterministic tool_adapter support planned for v0.2.
    severity: warning
    check: "substitution_valid"
    standing_order_on_violation: request_substitution_verification

  - id: relationship_correctly_mapped
    description: >
      Law 5 (Relational Mapping): relationships between co-varying quantities
      must be mapped correctly. Active during Artifact 14 (quadratic graphs) —
      the vertex represents one specific (x, y) pair, the axis of symmetry is
      the balance line, and the direction of opening is determined by the sign
      of the leading coefficient. Inverting the vertex coordinates or confusing
      the axis formula are canonical Law 5 failures in the quadratic context.
      NOTE: LLM-estimated; deterministic tool_adapter support planned for v0.2.
    severity: warning
    check: "relationship_correctly_mapped"
    standing_order_on_violation: request_rate_identification

  - id: standard_method_preferred
    description: >
      Non-standard solution methods are acceptable but should be flagged for
      Domain Authority review.
    severity: warning
    check: "method_recognized"
    standing_order_on_violation: request_method_justification
    signal_type: NOVEL_PATTERN

  - id: show_work_minimum
    description: >
      Solutions must show all required phases. For polynomial expansion: all
      partial products before collecting like terms. For factoring: factor pair
      identification, factored form, and expansion to verify. For quadratic
      equations: equation in standard form, method applied, all roots, and
      verification of each root in the original equation.
    severity: warning
    check: "step_count >= min_steps"
    standing_order_on_violation: request_more_steps

  # === WARNING INVARIANTS (new in this module) ===

  - id: structure_preserved
    description: >
      Law 4 (Structure Preservation): the shape of an expression may change
      (distribute, factor, simplify exponents) but its algebraic value must
      remain identical after each transformation. Distributing 3(x + 4) as
      3x + 4 (omitting the factor on the second term) is the canonical Law 4
      elementary failure. Factoring x² + 5x + 6 as (x + 2)(x + 2) is the
      canonical Law 4 verification failure. Structure transformations are
      only valid when forward AND reverse produce the same expression.
      NOTE: 'structure_preserved' is a new evidence field, currently estimated
      by the LLM interpreter. Deterministic tool_adapter support is planned
      for v0.2 of this module.
    severity: warning
    check: "structure_preserved"
    standing_order_on_violation: request_distribution_correction

  - id: model_accurately_transcribed
    description: >
      Law 6 (Abstraction/Translation): a real-world constraint must be
      transcribed into a precise mathematical sentence that correctly captures
      the role of each quantity. The canonical failure: writing C = 30m + 0.15
      instead of C = 0.15m + 30 for a per-mile cost problem (swapping the
      per-unit rate with the fixed cost). In quadratic contexts: incorrect sign
      on the gravity term or swapping the initial height and initial velocity
      in a projectile height model are canonical Law 6 failures.
      NOTE: 'model_accurately_transcribed' is a new evidence field, currently
      estimated by the LLM interpreter. Deterministic tool_adapter support is
      planned for v0.2 of this module.
    severity: warning
    check: "model_accurately_transcribed"
    standing_order_on_violation: request_model_verification

  - id: zpd_drift_minor
    description: >
      The student's challenge level has drifted outside the ZPD band in >= 30%
      of the recent window turns.
    severity: warning
    check: "outside_pct >= 0.3"
    handled_by: zpd_monitor
    standing_order_on_violation: zpd_scaffold

  - id: zpd_drift_major
    description: >
      The student's challenge level has drifted outside the ZPD band in >= 50%
      of recent window turns, or for 3+ consecutive turns.
    severity: warning
    check: "outside_pct >= 0.5"
    handled_by: zpd_monitor
    standing_order_on_violation: zpd_intervene_or_escalate

  - id: fluency_bottleneck
    description: >
      The student is solving problems correctly but consistently exceeding the
      time threshold, indicating procedural automaticity has not been achieved
      at the current tier.
    severity: warning
    check: "average_completion_time > fluency_monitor.time_threshold_seconds"
    handled_by: fluency_monitor
    standing_order_on_violation: trigger_targeted_hint

# ── Standing Orders ──────────────────────────────────────────

standing_orders:

  - id: request_more_steps
    action: request_more_steps
    trigger_condition: "equivalence_preserved or no_illegal_operations or show_work_minimum"
    max_attempts: 3
    escalation_on_exhaust: true
    description: >
      Ask the student to show their work at each transformation step. For
      polynomials: each partial product before collecting. For factoring: the
      factor pair choice, factored form, AND the expansion check. For quadratics:
      equation in standard form, all intermediate steps, each root, each root
      verified in the original equation.

  - id: request_verification_retry
    action: request_verification_retry
    trigger_condition: solution_verifies
    max_attempts: 2
    escalation_on_exhaust: true
    description: >
      Ask the student to verify their result. For equation roots: substitute
      each root into the original equation and confirm it equals zero. For
      factored forms: expand the factors and confirm the result matches the
      original polynomial exactly.

  - id: request_distribution_correction
    action: inject_domain_rule
    trigger_condition: structure_preserved
    max_attempts: 2
    escalation_on_exhaust: false
    description: >
      Provide the Law 4 scaffolding. Ask the student: "Show me the factored form
      expanded back out — does it match the original expression exactly?" Do not
      identify the specific distribution error on the first prompt. The expansion
      check forces them to discover the structural mismatch themselves.

  - id: request_model_verification
    action: request_model_verification
    trigger_condition: model_accurately_transcribed
    max_attempts: 2
    escalation_on_exhaust: true
    description: >
      Provide the Law 6 scaffold. Ask the student to read back each term of their
      equation in plain language: "In your equation, what does each term represent
      in the real-world situation? What happens to the total when this quantity
      increases by 1?" Do not identify which quantity is wrong — let their own
      re-reading surface the mismatch.

  - id: request_substitution_verification
    action: request_substitution_verification
    trigger_condition: substitution_valid
    max_attempts: 2
    escalation_on_exhaust: true
    description: >
      Prompt the student to check which equations or expressions they have
      verified their answer against. Ask them to verify in the one they have
      not yet checked.

  - id: request_rate_identification
    action: inject_domain_rule
    trigger_condition: relationship_correctly_mapped
    max_attempts: 2
    escalation_on_exhaust: false
    description: >
      Provide the Law 5 scaffolding in the quadratic context: ask the student
      to identify whether the parabola opens up or down, and where the
      minimum or maximum occurs. Do not state the vertex formula directly on
      the first prompt.

  - id: hint_reverse_order_of_operations
    action: inject_domain_rule
    trigger_condition: reversibility_order_correct
    max_attempts: 2
    escalation_on_exhaust: false
    description: >
      Provide the Law 2 scaffolding: ask the student to list the operations on
      the variable in order, then undo them from last to first.

  - id: request_method_justification
    action: request_method_justification
    trigger_condition: standard_method_preferred
    max_attempts: 1
    escalation_on_exhaust: false
    description: >
      Acknowledge the non-standard approach and ask the student to explain their
      reasoning. Flag for Domain Authority review.

  - id: zpd_scaffold
    action: zpd_scaffold
    trigger_condition: zpd_drift_minor
    max_attempts: 3
    escalation_on_exhaust: false
    description: >
      Reduce challenge level on the next task. Offer an optional hint. Provide
      additional scaffolding in the explanation.

  - id: zpd_intervene_or_escalate
    action: zpd_intervene_or_escalate
    trigger_condition: "zpd_drift_major or frustration_flag"
    max_attempts: 1
    escalation_on_exhaust: true
    description: >
      Pause the current task. Issue one probe question to check understanding.
      If the probe response does not improve state, escalate to teacher.

  - id: trigger_targeted_hint
    action: trigger_targeted_hint
    trigger_condition: fluency_bottleneck
    max_attempts: 3
    escalation_on_exhaust: false
    description: >
      Provide a targeted procedural hint for the step the student is slowing on.
      Do not solve the problem.

# ── Escalation Triggers ──────────────────────────────────────

escalation_triggers:

  - id: critical_invariant_unresolvable
    condition: >
      A critical invariant (equivalence_preserved, no_illegal_operations, or
      solution_verifies) was violated and its standing order has been exhausted
      without resolution.
    target_role: teacher
    sla_minutes: 30

  - id: major_zpd_drift_unresolved
    condition: >
      The zpd_intervene_or_escalate standing order was applied and the probe
      response did not reduce outside_pct below the minor threshold.
    target_role: teacher
    sla_minutes: 30

  - id: novel_pattern_review
    condition: >
      The standard_method_preferred invariant fired and the student could not
      explain their non-standard reasoning after one justification request.
    target_role: teacher
    sla_minutes: 120

# ── Artifacts ─────────────────────────────────────────────────
# 5 gated artifacts spanning Units 5–7. Each unlocks after mastery >= 0.8
# on its required skills, confirmed by its boss challenge.
# Boss challenges: no hints, 1 attempt per session, pass_threshold 0.8.
# All 6 diagnostic laws are active; the sensor runs at full capacity.
# Curriculum position: Artifacts 11–15 in the full 15-artifact sequence.

artifacts:

  - id: exponent_rules
    name: "Exponent Rules"
    unit: "5 — Exponents & Polynomials"
    description: >
      The student can apply the core exponent rules — product rule (xᵃ · xᵇ = xᵃ⁺ᵇ),
      power rule ((xᵃ)ᵇ = xᵃᵇ), quotient rule (xᵃ / xᵇ = xᵃ⁻ᵇ), and negative
      exponent rule (x⁻ⁿ = 1/xⁿ) — to simplify expressions involving multiple
      exponent operations in a single combined expression. Law 4 numeric entry
      point: each rule transforms the shape of the expression while preserving
      its value.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - structure_preserved
      - show_work_minimum
    boss_challenge:
      id: boss_exponent_rules_v1
      task_description: >
        Simplify: (x²)³ · x⁻¹ / x⁴.
        Show each exponent rule you apply as a separate step. State the rule
        used (product, power, quotient, or negative exponent) beside each step.
        Write your final answer with a positive exponent.
      sensor_purpose: >
        Four exponent rules must be applied sequentially in the correct order —
        power rule first on (x²)³, then product rule to combine with x⁻¹, then
        quotient rule to divide by x⁴. The canonical Law 4 failure: applying
        (x²)³ as x⁵ (adding exponents instead of multiplying) — the expression's
        shape changes incorrectly. The rule-naming requirement ensures the student
        is not pattern-matching but actively categorising each transformation.
        Naming a rule incorrectly while applying it correctly is a signal that
        the student can execute but cannot articulate the structural principle.
      grading:
        - check: structure_preserved
          weight: 0.50
        - check: correct_final_value
          weight: 0.35
        - check: step_count >= 3
          weight: 0.15
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

  - id: polynomial_operations
    name: "Polynomial Operations — Expansion"
    unit: "5 — Exponents & Polynomials"
    description: >
      The student can multiply two binomials using FOIL (First, Outer, Inner, Last),
      ensuring all four partial products are computed before collecting like terms.
      They can also add and subtract polynomials by combining only like-degree terms.
      Law 4 assembly: the product form and the expanded form are two shapes of the
      same expression. FOIL is the systematic procedure that guarantees the
      transformation is structure-preserving.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - structure_preserved
      - equivalence_preserved
      - show_work_minimum
    boss_challenge:
      id: boss_polynomial_operations_v1
      task_description: >
        Expand (x + 3)(x − 5) using FOIL.
        (a) List all four partial products (First, Outer, Inner, Last) on separate
            lines before collecting like terms.
        (b) Collect like terms and write the simplified polynomial.
        (c) Verify that x = 5 is a root of your simplified polynomial
            by substituting it in and checking that the result equals zero.
      sensor_purpose: >
        Part (a) makes all four partial products visible — the canonical Law 4
        assembly failure is a missing partial product (usually the Outer or Inner
        cross-term), which collapses (x+3)(x−5) to x²−15 (the constant product
        only, not the full expansion). Part (c) uses substitution verification
        (Law 3) to confirm the expanded form and the factored form are the same
        object — activating both laws simultaneously. x = 5 is chosen because it
        makes the factored form trivially checkable: (5+3)(5−5) = 8·0 = 0.
      grading:
        - check: structure_preserved
          weight: 0.45
        - check: equivalence_preserved
          weight: 0.30
        - check: verify_solution_substitution
          weight: 0.25
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

  - id: factoring_quadratics
    name: "Factoring Quadratics"
    unit: "5 — Exponents & Polynomials"
    description: >
      The student can factor a monic quadratic x² + bx + c into (x + p)(x + q)
      by finding integers p and q such that p·q = c and p + q = b, and must
      then verify the factored form by expanding it back to the original. This
      is the Law 4 disassembly artifact — the hardest structural diagnostic in
      the curriculum. A student who can FOIL but cannot reverse the process
      understands Law 4 in one direction only.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - structure_preserved
      - equivalence_preserved
      - substitution_valid
      - show_work_minimum
    boss_challenge:
      id: boss_factoring_quadratics_v1
      task_description: >
        Factor x² + 5x + 6.
        (a) Find the two integers p and q such that p·q = 6 and p + q = 5.
            Show your factor pairs considered.
        (b) Write the factored form.
        (c) Verify by expanding your factored form using FOIL back to the
            original polynomial. Show all four partial products.
        (d) State the two roots of x² + 5x + 6 = 0.
      sensor_purpose: >
        The canonical Law 4 disassembly sensor. A student who can only FOIL
        but cannot reverse the process (x² + 5x + 6 → (x+2)(x+3)) has mastered
        assembly but not disassembly. Part (c) — the verify-by-expanding —
        forces structural bidirectionality. A student who produces the wrong
        factors in (b) will discover the mismatch in (c) when the FOIL does not
        reproduce the original; they cannot pass (c) without correcting (b). Part
        (d) activates Law 3: the roots are the values that make the substituted
        form equal zero — the factored form IS the original expression, so the
        same roots satisfy both.
      grading:
        - check: structure_preserved
          weight: 0.40
        - check: verify_solution_substitution
          weight: 0.35
        - check: substitution_valid
          weight: 0.15
        - check: step_count >= 4
          weight: 0.10
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

  - id: quadratic_graphs_and_vertex
    name: "Quadratic Graphs & the Vertex"
    unit: "7 — Quadratic Functions & Equations"
    description: >
      The student can find the axis of symmetry (x = −b/2a), vertex, and x-intercepts
      of a quadratic in standard form y = ax² + bx + c, determine whether the parabola
      opens upward or downward, and identify the minimum or maximum. Law 5 in the
      quadratic context: the parabola is a U-shaped dynamic relationship where the
      vertex is the turning point and the axis of symmetry is the balance line. The
      direction of opening depends on the sign of a — the leading coefficient is the
      engine of the relationship's shape.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - relationship_correctly_mapped
      - equivalence_preserved
      - show_work_minimum
    boss_challenge:
      id: boss_quadratic_graphs_vertex_v1
      task_description: >
        For y = x² − 6x + 5:
        (a) Does the parabola open up or down? How do you know?
        (b) Find the axis of symmetry. Show your x = −b/2a calculation.
        (c) Find the vertex coordinates. Show the y-calculation.
        (d) Find the x-intercepts by setting y = 0. Show your method.
        (e) Sketch a description of the parabola: where does it cross the axes,
            where is its lowest point, and is it symmetric?
      sensor_purpose: >
        Part (a) is the Law 5 direction probe: the sign of a determines the
        shape of the entire relationship. Part (b)–(c) are the core Law 5
        mapping: axis at x = −b/2a (x = 3 here), vertex at (3, −4). The most
        common failure: computing x = −b/2a correctly but then not substituting
        back into the original equation to find the y-coordinate (the vertex
        y must be computed from the original equation, not guessed). Part (d)
        requires roots at x = 1 and x = 5, symmetric about x = 3 — confirming
        the axis. Part (e) integrates all findings into a coherent structural
        description, revealing whether the student sees the parabola as a
        relationship (Law 5) or as a collection of disconnected computed values.
      grading:
        - check: relationship_correctly_mapped
          weight: 0.45
        - check: equivalence_preserved
          weight: 0.30
        - check: correct_final_value
          weight: 0.15
        - check: step_count >= 4
          weight: 0.10
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

  - id: quadratic_equations
    name: "Solving Quadratic Equations"
    unit: "7 — Quadratic Functions & Equations"
    description: >
      The student can solve a quadratic equation ax² + bx + c = 0 by factoring
      and confirm the roots using the quadratic formula. They can also translate
      a real-world quadratic constraint from a word problem into a correctly
      structured equation before solving. This artifact activates all six
      diagnostic laws simultaneously: balance (Law 1), inverse operations (Law 2),
      identity-based roots (Law 3), structural factoring (Law 4), the dynamic
      two-variable relationship (Law 5), and real-world transcription (Law 6).
      The full-sensor artifact — the terminal diagnostic gate of the curriculum.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - equivalence_preserved
      - reversibility_order_correct
      - substitution_valid
      - structure_preserved
      - relationship_correctly_mapped
      - model_accurately_transcribed
      - solution_verifies
      - show_work_minimum
    boss_challenge:
      id: boss_quadratic_equations_v1
      task_description: >
        Part A — Algebraic:
          Solve x² − 5x + 6 = 0.
          (1) Solve by factoring — find the factored form and state both roots.
          (2) Confirm both roots using the quadratic formula x = (−b ± √(b²−4ac)) / 2a.
              Show the discriminant calculation separately.
          (3) Verify each root by substituting into the original equation.

        Part B — Word Problem (Law 6 sensor):
          A rectangular garden has a length that is 3 meters more than its width.
          The area of the garden is 40 square meters.
          (1) Define your variable. Write an equation for the area.
          (2) Rearrange into standard form ax² + bx + c = 0 and solve.
          (3) State which solution is valid in context and explain why.
      sensor_purpose: >
        Part A is the Laws 1+2+3+4 integration test. x = 2 and x = 3 (roots of
        (x−2)(x−3)) are close enough that a student guessing can produce one correct
        root — the quadratic formula confirmation in step (2) and the dual
        substitution verification in step (3) rule out lucky guessing. The
        discriminant must be shown separately (b²−4ac = 25−24 = 1) to make the
        arithmetic of the formula transparent.
        Part B is the terminal Law 6 sensor. The garden problem has two natural
        transcription failure modes: writing w(w+3) = 40 is correct; writing
        (w+3)w = 40 is also correct (commutative) but many students write
        w + (w+3) = 40 (confusing area with perimeter) or w·3 = 40 (ignoring the
        width as a factor). Setting the area equation up correctly, rearranging
        to standard form (w² + 3w − 40 = 0), factoring to (w+8)(w−5) = 0, and
        rejecting w = −8 as non-physical completes all 6 laws in a single problem.
      grading:
        - check: structure_preserved
          weight: 0.25
        - check: model_accurately_transcribed
          weight: 0.25
        - check: verify_solution_substitution
          weight: 0.25
        - check: equivalence_preserved
          weight: 0.15
        - check: step_count >= 6
          weight: 0.10
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

# ── Subsystem Configurations ─────────────────────────────────

subsystem_configs:
  zpd_monitor:
    min_challenge: 0.3
    max_challenge: 0.85
    drift_window_turns: 10
    minor_drift_threshold: 0.3
    major_drift_threshold: 0.5
    persistence_required: 3

  fluency_monitor:
    target_consecutive_successes: 3
    time_threshold_seconds: 150
    tier_progression:
      - tier_1: exponent_rules
      - tier_2: polynomial_and_factoring
      - tier_3: quadratic_equations

  equation_difficulty_tiers:
    - tier_id: tier_1
      label: "Entry — Exponent Rules"
      equation_type: exponent_rules
      equation_template: "xᵃ · xᵇ, (xᵃ)ᵇ, xᵃ/xᵇ, x⁻ⁿ — simplify combined exponent expressions"
      min_difficulty: 0.0
      max_difficulty: 0.35

    - tier_id: tier_2
      label: "Intermediate — Polynomial Operations & Factoring"
      equation_type: polynomial_and_factoring
      equation_template: "(x + a)(x + b) expand  or  x² + bx + c → (x + p)(x + q) factor"
      min_difficulty: 0.35
      max_difficulty: 0.65

    - tier_id: tier_3
      label: "Advanced — Quadratic Equations & Graphs"
      equation_type: quadratic_equations
      equation_template: "ax² + bx + c = 0  solved by factoring and confirmed by quadratic formula; word problem transcription"
      min_difficulty: 0.65
      max_difficulty: 1.0

# ── Evidence Schema ───────────────────────────────────────────

evidence_schema:
  path: "evidence-schema.json"
  version: "1.0"
  notes: >
    New evidence fields introduced by this module:
    - structure_preserved: bool — currently estimated by the LLM interpreter;
      deterministic tool_adapter support planned for module v0.2. Covers both
      distribution errors and incorrect factoring (shapes that don't expand back
      to the original).
    - model_accurately_transcribed: bool — same status. Covers word-problem
      transcription errors: wrong operator roles (rate vs constant), sign errors
      in physics models (gravity term direction), dimension confusion (area vs
      perimeter), and variable definition mismatches.
    Inherited fields from algebra-intro:
      substitution_valid, relationship_correctly_mapped, context_interpretation_correct,
      reversibility_order_correct, inequality_direction_correct, correctness,
      substitution_check, step_count, equivalence_preserved, illegal_operations,
      off_task_ratio, frustration_marker_count, hint_used.

# ── Glossary ─────────────────────────────────────────────────

glossary:
  - term: exponent
    definition: >-
      A number written as a superscript that tells how many times the base is
      multiplied by itself. In xⁿ, x is the base and n is the exponent.
      x⁻ⁿ = 1/xⁿ (negative exponent means reciprocal).
    aliases: [power, exponents, superscript, raised to]
    related_terms: [base, product rule, power rule, quotient rule]
    example_in_context: >-
      x³ means x · x · x. (x²)³ = x⁶ (power rule: multiply exponents).
      x⁻² = 1/x² (negative exponent: take the reciprocal).

  - term: product rule
    definition: >-
      When multiplying two powers with the same base, keep the base and add
      the exponents: xᵃ · xᵇ = xᵃ⁺ᵇ.
    aliases: [add exponents, multiply same base]
    related_terms: [exponent, power rule, quotient rule]
    example_in_context: >-
      x³ · x² = x⁵. Also: x⁶ · x⁻¹ = x⁵ (add 6 and −1).

  - term: power rule
    definition: >-
      When raising a power to another power, keep the base and multiply the
      exponents: (xᵃ)ᵇ = xᵃᵇ.
    aliases: [multiply exponents, power to a power]
    related_terms: [exponent, product rule]
    example_in_context: >-
      (x²)³ = x⁶ (2 × 3 = 6). Common error: (x²)³ = x⁵ (adding instead of multiplying).

  - term: FOIL
    definition: >-
      A mnemonic for multiplying two binomials: First (the first terms of each),
      Outer (the outer pair), Inner (the inner pair), Last (the last terms of each).
      All four partial products must be computed before collecting like terms.
    aliases: [First Outer Inner Last, binomial multiplication, distribute twice]
    related_terms: [polynomial, factoring, structure_preserved]
    example_in_context: >-
      (x + 3)(x − 5): F = x·x = x², O = x·(−5) = −5x, I = 3·x = 3x, L = 3·(−5) = −15.
      Collect: x² + (−5x + 3x) − 15 = x² − 2x − 15.

  - term: polynomial
    definition: >-
      An expression with one or more terms, each a product of a constant and a
      variable raised to a non-negative integer power. Polynomials are classified
      by their highest degree: degree 2 = quadratic, degree 1 = linear.
    aliases: [polynomials, quadratic, trinomial, binomial]
    related_terms: [FOIL, factoring, like terms]
    example_in_context: >-
      x² − 2x − 15 is a degree-2 polynomial (quadratic). It has three terms
      (trinomial): x², −2x, and −15.

  - term: factoring
    definition: >-
      The reverse of expanding: rewriting a polynomial as a product of simpler
      expressions. For monic quadratics x² + bx + c, find integers p and q with
      p·q = c and p + q = b, giving (x + p)(x + q). The factored form and the
      original are identical expressions — must verify by expanding.
    aliases: [factor, factored form, factor a quadratic, reverse FOIL]
    related_terms: [FOIL, roots, zero product property, structure_preserved]
    example_in_context: >-
      x² + 5x + 6: find p·q = 6 and p + q = 5 → p = 2, q = 3.
      Factored form: (x + 2)(x + 3). Verify: FOIL gives x² + 5x + 6. ✓

  - term: vertex
    definition: >-
      The turning point of a parabola — the minimum point if the parabola opens
      upward (a > 0) or the maximum point if it opens downward (a < 0). Located
      at x = −b/2a (axis of symmetry); the y-coordinate is found by substituting
      x back into the original equation.
    aliases: [turning point, minimum, maximum, vertex point]
    related_terms: [axis of symmetry, parabola, quadratic, relationship_correctly_mapped]
    example_in_context: >-
      y = x² − 6x + 5: axis x = −(−6)/(2·1) = 3. y at x = 3: 9 − 18 + 5 = −4.
      Vertex: (3, −4). This is the lowest point; parabola opens upward.

  - term: axis of symmetry
    definition: >-
      The vertical line that divides a parabola into two mirror-image halves.
      For y = ax² + bx + c, it is x = −b/2a. The vertex lies on this line.
    aliases: [axis, line of symmetry, symmetry axis]
    related_terms: [vertex, parabola, quadratic]
    example_in_context: >-
      For y = x² − 6x + 5, axis of symmetry is x = 3. The roots x = 1 and x = 5
      are equidistant from x = 3 (distance 2 each), confirming the symmetry.

  - term: quadratic formula
    definition: >-
      The universal formula for solving ax² + bx + c = 0:
      x = (−b ± √(b² − 4ac)) / 2a. The discriminant b² − 4ac tells how many
      real roots exist: positive → 2, zero → 1 (double root), negative → 0.
    aliases: [quadratic equation formula, abc formula, discriminant formula]
    related_terms: [discriminant, roots, factoring, quadratic]
    example_in_context: >-
      x² − 5x + 6 = 0: a=1, b=−5, c=6. Discriminant = 25 − 24 = 1.
      x = (5 ± 1) / 2 → x = 3 or x = 2.

  - term: discriminant
    definition: >-
      The expression b² − 4ac inside the square root of the quadratic formula.
      Its value determines the nature of the roots: > 0 means two distinct real
      roots, = 0 means exactly one real root (double), < 0 means no real roots.
    aliases: [b² − 4ac, b2 - 4ac, nature of roots]
    related_terms: [quadratic formula, roots, quadratic]
    example_in_context: >-
      For x² − 5x + 6 = 0: discriminant = (−5)² − 4(1)(6) = 25 − 24 = 1.
      Positive discriminant → two distinct real roots.

  - term: zero product property
    definition: >-
      If the product of two factors equals zero, at least one factor must be
      zero. Written: if A · B = 0, then A = 0 or B = 0. This is how factored
      quadratics yield their roots.
    aliases: [zero product, null factor law, factor = 0]
    related_terms: [factoring, roots, quadratic equations]
    example_in_context: >-
      (x + 2)(x + 3) = 0 → x + 2 = 0 or x + 3 = 0 → x = −2 or x = −3.

  - term: standard form
    definition: >-
      For a quadratic equation, standard form is ax² + bx + c = 0 with everything
      on one side and zero on the other. Required before applying the quadratic
      formula or factoring.
    aliases: [standard quadratic form, quadratic standard form]
    related_terms: [quadratic formula, factoring, quadratic equations]
    example_in_context: >-
      x² = 5x − 6 is NOT in standard form. Rearrange: x² − 5x + 6 = 0. Now
      a = 1, b = −5, c = 6 can be read for the quadratic formula.
