# Algebra Intro Domain Pack — Grade 8
# Version: 0.1.0
# Conforms to: lumina-core-v1.0.0
# ============================================================
# Diagnostic Law Coverage:
#   Law 1 — Balance Principle (equivalence_preserved):       CRITICAL  (inherited)
#   Law 2 — Inverse Operations (reversibility):              WARNING   (inherited)
#   Law 3 — Interchangeability/Substitution:                 WARNING   (new — LLM-estimated)
#   Law 5 — Relational Mapping (functions/rates):            WARNING   (new — LLM-estimated)
#   Laws 4, 6:                                               NOT ACTIVE in this module
# ============================================================
# Curriculum position: Artifacts 6–10 of 15 (full sequence)
# Prerequisite: domain/edu/pre-algebra/v1 — all 5 artifacts passed
# ============================================================

id: domain/edu/algebra-intro/v1
version: "0.1.0"

domain_authority:
  name: "Lead Algebra Teacher"
  role: "Teacher"
  pseudonymous_id: "da_algebra_intro_lead_001"

meta_authority_id: domain/edu/curriculum/v1

description: >
  Algebra Introduction for grade 8. Extends the Pre-Algebra foundation
  (domain/edu/pre-algebra/v1) by activating two new diagnostic laws:
  Law 3 (Interchangeability/Substitution) and Law 5 (Relational Mapping).
  Covers slope and rate of change, linear forms and graphing, and three
  methods for solving systems of two linear equations. Students work through
  5 gated artifacts (Artifacts 6–10 in the full 15-artifact curriculum).
  Prerequisite: Pre-Algebra (domain/edu/pre-algebra/v1).
  Gateway to Algebra 1 (domain/edu/algebra-1/v1, grade 9).

lumina_core_version: "1.0.0"

# ── Invariants ───────────────────────────────────────────────

invariants:

  # === CRITICAL INVARIANTS (inherited from pre-algebra) ===

  - id: equivalence_preserved
    description: >
      Law 1 (Balance Principle): both sides of an equation must remain
      algebraically equal after every transformation step. In systems of
      equations each individual equation must independently stay balanced —
      multiplying or adding equations to eliminate a variable is only valid
      because both operations are applied to equivalent quantities.
    severity: critical
    check: "equivalence_preserved"
    standing_order_on_violation: request_more_steps

  - id: no_illegal_operations
    description: >
      Division by zero or any other undefined operation is not permitted.
    severity: critical
    check: "illegal_operations == []"
    standing_order_on_violation: request_more_steps

  - id: solution_verifies
    description: >
      The proposed solution must satisfy ALL original equations in the system.
      For systems of two equations: the solution pair (x, y) must be verified
      by substituting into both equations independently and confirming both
      sides balance. Verifying in only one equation is a Law 3 failure.
    severity: critical
    check: "substitution_check"
    standing_order_on_violation: request_verification_retry

  # === WARNING INVARIANTS (inherited) ===

  - id: reversibility_order_correct
    description: >
      Law 2 (Inverse Operations): inverse operations must be applied in the
      correct reversed-PEMDAS order. Inherited from pre-algebra; remains active
      when solving the single-variable equations that arise during back-
      substitution in system solving. NOTE: LLM-estimated; deterministic
      tool_adapter support planned for module v0.2.
    severity: warning
    check: "reversibility_order_correct"
    standing_order_on_violation: hint_reverse_order_of_operations

  - id: standard_method_preferred
    description: >
      Non-standard solution methods are acceptable but should be flagged for
      Domain Authority review.
    severity: warning
    check: "method_recognized"
    standing_order_on_violation: request_method_justification
    signal_type: NOVEL_PATTERN

  - id: show_work_minimum
    description: >
      Solutions must show all required phases. For systems: (1) setup or
      isolate step, (2) substitution or elimination operation, (3) single-
      variable solve, (4) back-substitution, (5) verification in both original
      equations. A bare answer-pair with no work is not acceptable.
    severity: warning
    check: "step_count >= min_steps"
    standing_order_on_violation: request_more_steps

  # === WARNING INVARIANTS (new in this module) ===

  - id: substitution_valid
    description: >
      Law 3 (Interchangeability): when an expression for a variable is known
      the equivalence is a binding identity — it must hold in every equation
      of the system, not only the one currently being simplified. A student who
      substitutes y = 2x − 4 into 3x + y = 10 but never checks the solution
      in the first equation has treated the expression as a local plug-in rather
      than a universally true identity. That is the canonical Law 3 failure.
      NOTE: 'substitution_valid' is a new evidence field, currently estimated
      by the LLM interpreter. Full deterministic tool_adapter support is planned
      for v0.2 of this module.
    severity: warning
    check: "substitution_valid"
    standing_order_on_violation: request_substitution_verification

  - id: relationship_correctly_mapped
    description: >
      Law 5 (Relational Mapping): in y = mx + b the slope m is the rate of
      change (Δy/Δx) — how much y changes per unit increase in x — and b is
      the starting value. Inverting slope (reading y-change as x-change or
      swapping slope and intercept) is the canonical Law 5 failure. The law
      activates whenever a table, graph, or equation describes a co-varying
      relationship between two quantities.
      NOTE: 'relationship_correctly_mapped' is a new evidence field, currently
      estimated by the LLM interpreter. Full deterministic tool_adapter support
      is planned for v0.2 of this module.
    severity: warning
    check: "relationship_correctly_mapped"
    standing_order_on_violation: request_rate_identification

  - id: zpd_drift_minor
    description: >
      The student's challenge level has drifted outside the ZPD band in >= 30%
      of the recent window turns.
    severity: warning
    check: "outside_pct >= 0.3"
    handled_by: zpd_monitor
    standing_order_on_violation: zpd_scaffold

  - id: zpd_drift_major
    description: >
      The student's challenge level has drifted outside the ZPD band in >= 50%
      of recent window turns, or for 3+ consecutive turns.
    severity: warning
    check: "outside_pct >= 0.5"
    handled_by: zpd_monitor
    standing_order_on_violation: zpd_intervene_or_escalate

  - id: fluency_bottleneck
    description: >
      The student is solving problems correctly but consistently exceeding the
      time threshold, indicating procedural automaticity has not been achieved
      at the current tier.
    severity: warning
    check: "average_completion_time > fluency_monitor.time_threshold_seconds"
    handled_by: fluency_monitor
    standing_order_on_violation: trigger_targeted_hint

# ── Standing Orders ──────────────────────────────────────────

standing_orders:

  - id: request_more_steps
    action: request_more_steps
    trigger_condition: "equivalence_preserved or no_illegal_operations or show_work_minimum"
    max_attempts: 3
    escalation_on_exhaust: true
    description: >
      Ask the student to show their work step by step. For systems, ask them
      to show setup, substitution or elimination operation, single-variable
      solve, back-substitution, and verification in each original equation.

  - id: request_verification_retry
    action: request_verification_retry
    trigger_condition: solution_verifies
    max_attempts: 2
    escalation_on_exhaust: true
    description: >
      Ask the student to substitute their solution pair (x, y) back into BOTH
      original equations and confirm both sides balance in each. If they have
      only checked one equation, name the one they have not yet verified.

  - id: request_substitution_verification
    action: request_substitution_verification
    trigger_condition: substitution_valid
    max_attempts: 2
    escalation_on_exhaust: true
    description: >
      Prompt the student to examine which equations they have checked their
      solution in. Ask: "You have your answer — now substitute it into the
      equation you have not checked yet and confirm it still holds." Do not
      state the interchangeability rule directly on the first prompt.

  - id: request_rate_identification
    action: inject_domain_rule
    trigger_condition: relationship_correctly_mapped
    max_attempts: 2
    escalation_on_exhaust: false
    description: >
      Provide the Law 5 scaffolding: ask the student to identify which
      quantity changes when x increases by exactly 1 unit. Ask: "If x goes
      from 2 to 3, what happens to y?" Guide them to compute Δy/Δx without
      pointing out their inversion directly on the first prompt.

  - id: hint_reverse_order_of_operations
    action: inject_domain_rule
    trigger_condition: reversibility_order_correct
    max_attempts: 2
    escalation_on_exhaust: false
    description: >
      Provide the Law 2 scaffolding: ask the student to list the operations
      applied to the variable (in the order they appear), then ask them to
      undo those operations starting from the last one.

  - id: request_method_justification
    action: request_method_justification
    trigger_condition: standard_method_preferred
    max_attempts: 1
    escalation_on_exhaust: false
    description: >
      Acknowledge the non-standard approach and ask the student to explain
      their reasoning. Flag for Domain Authority review.

  - id: zpd_scaffold
    action: zpd_scaffold
    trigger_condition: zpd_drift_minor
    max_attempts: 3
    escalation_on_exhaust: false
    description: >
      Reduce challenge level on the next task. Offer an optional hint.
      Provide additional scaffolding in the explanation.

  - id: zpd_intervene_or_escalate
    action: zpd_intervene_or_escalate
    trigger_condition: "zpd_drift_major or frustration_flag"
    max_attempts: 1
    escalation_on_exhaust: true
    description: >
      Pause the current task. Issue one probe question to check understanding.
      If the probe response does not improve state, escalate to teacher.

  - id: trigger_targeted_hint
    action: trigger_targeted_hint
    trigger_condition: fluency_bottleneck
    max_attempts: 3
    escalation_on_exhaust: false
    description: >
      Provide a targeted procedural hint for the specific step the student is
      slowing on (e.g. which quantity is the rate, which equation to substitute
      into). Do not solve the problem.

# ── Escalation Triggers ──────────────────────────────────────

escalation_triggers:

  - id: critical_invariant_unresolvable
    condition: >
      A critical invariant (equivalence_preserved, no_illegal_operations, or
      solution_verifies) was violated and its standing order has been exhausted
      without resolution.
    target_role: teacher
    sla_minutes: 30

  - id: major_zpd_drift_unresolved
    condition: >
      The zpd_intervene_or_escalate standing order was applied and the probe
      response did not reduce outside_pct below the minor threshold.
    target_role: teacher
    sla_minutes: 30

  - id: novel_pattern_review
    condition: >
      The standard_method_preferred invariant fired and the student could not
      explain their non-standard reasoning after one justification request.
    target_role: teacher
    sla_minutes: 120

# ── Artifacts ─────────────────────────────────────────────────
# 5 gated artifacts spanning Units 3–4. Each unlocks after mastery >= 0.8
# on its required skills, confirmed by its boss challenge.
# Boss challenges: no hints, 1 attempt per session, pass_threshold 0.8.
# Equation forms are chosen to make target law signals unavoidable.
# Curriculum position: Artifacts 6–10 in the full 15-artifact sequence.

artifacts:

  - id: slope_and_rate_of_change
    name: "Slope & Rate of Change"
    unit: "3 — Graphing & Linear Relationships"
    description: >
      The student can calculate slope from a table, two points, or a graph
      as Δy/Δx, interpret it as a rate of change in context (what changes per
      unit), and distinguish slope from the y-intercept starting value. This is
      the Law 5 entry point — variables are no longer static hidden numbers but
      co-varying quantities linked by a constant rate.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - relationship_correctly_mapped
      - show_work_minimum
    boss_challenge:
      id: boss_slope_rate_of_change_v1
      task_description: >
        A table shows hours worked (x) and total earnings in dollars (y):
          x : 0 | 2 | 4 | 6
          y : 5 | 17 | 29 | 41
        (a) Calculate the rate of change. Show your Δy/Δx calculation using
            two rows of your choice.
        (b) What does the rate of change mean in this context?
        (c) Identify the y-intercept. What does it represent in this context?
      sensor_purpose: >
        Part (a) forces Δy/Δx as an explicit written computation using two
        chosen table rows — not a patternrecognition lookup. Reading across a
        row instead of computing Δy and Δx is the canonical Law 5 inversion
        failure (treating a single y-value as the rate). Part (b) confirms the
        student understands that rate describes how the relationship works, not
        just a coefficient. Part (c) distinguishes slope from the y-intercept
        starting value — the second most common Law 5 confusion (reading "5" as
        the rate and "12" as the intercept).
      grading:
        - check: relationship_correctly_mapped
          weight: 0.45
        - check: context_interpretation_correct
          weight: 0.35
        - check: step_count >= 2
          weight: 0.20
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

  - id: linear_forms_and_graphing
    name: "Slope-Intercept Form & Graphing"
    unit: "3 — Graphing & Linear Relationships"
    description: >
      The student can identify slope and y-intercept from y = mx + b form,
      graph a line by plotting the y-intercept and using slope as rise/run,
      convert between slope-intercept and standard form, and write the equation
      of a line given one point and the slope. Laws 1 and 5 are active together
      for the first time: building the equation requires balance (Law 1) and
      correct rate assignment (Law 5).
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - equivalence_preserved
      - relationship_correctly_mapped
      - show_work_minimum
    boss_challenge:
      id: boss_linear_forms_graphing_v1
      task_description: >
        (a) For y = −⅔x + 4: state the slope and the y-intercept. Describe
            how you would graph this line — where do you start, and which
            direction do you move for each step?
        (b) Write the equation of the line through the point (6, 2) with
            slope −⅔. Show your work using point-slope form, then convert
            to slope-intercept form.
      sensor_purpose: >
        Part (a) probes the core Law 5 distinction: is −⅔ correctly identified
        as slope (not intercept) and 4 as the y-intercept (not slope)? The
        negative fraction also requires a signed direction decision for
        rise/run. Part (b) requires building a balanced equation step-by-step
        (Law 1) from a point and rate — a student who swaps the slope and
        intercept in part (b) produces a verifiably wrong equation (the point
        (6, 2) will not satisfy it), making the error self-evident to the
        grader. The combined grading prevents passing on one part alone.
      grading:
        - check: relationship_correctly_mapped
          weight: 0.40
        - check: equivalence_preserved
          weight: 0.30
        - check: verify_solution_substitution
          weight: 0.20
        - check: step_count >= 3
          weight: 0.10
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

  - id: systems_by_graphing
    name: "Systems of Equations — Graphing Method"
    unit: "4 — Systems of Linear Equations"
    description: >
      The student can solve a 2×2 system of linear equations by graphing both
      lines on the same plane, identifying the intersection point, and verifying
      the coordinates in both original equations. This is the Law 3 entry
      artifact: the intersection represents the one (x, y) pair that satisfies
      two independent constraints simultaneously.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - equivalence_preserved
      - relationship_correctly_mapped
      - solution_verifies
      - show_work_minimum
    boss_challenge:
      id: boss_systems_by_graphing_v1
      task_description: >
        Solve the system by graphing:
          y = x + 1
          y = −2x + 7
        (a) Graph both lines. Show the two points you used to plot each line.
        (b) State the coordinates of the intersection point.
        (c) Verify your answer by substituting the coordinates into BOTH
            original equations. Show the substitution for each equation.
      sensor_purpose: >
        Part (c) is the Law 3 sensor: requiring written verification in both
        equations forces the student to treat the solution as a binding identity
        satisfying two independent constraints — not merely a point on one line.
        A student who verifies in only one equation has not yet grasped
        interchangeability. The graphing in parts (a)–(b) tests Law 5 (slope
        as rise/run from the y-intercept). The intersection is off the y-axis
        so proper rise/run interpretation is required to locate it.
      grading:
        - check: substitution_valid
          weight: 0.35
        - check: relationship_correctly_mapped
          weight: 0.25
        - check: solution_verifies
          weight: 0.30
        - check: step_count >= 4
          weight: 0.10
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

  - id: systems_by_substitution
    name: "Systems of Equations — Substitution Method"
    unit: "4 — Systems of Linear Equations"
    description: >
      The student can solve a 2×2 system where one variable is already isolated
      by substituting its expression into the second equation, solving for the
      remaining variable, back-substituting to find the first variable, and
      verifying the solution pair in both original equations. This is the
      canonical Law 3 artifact: the substitution expression is a universally
      true identity, not a local plug-in for one equation only.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - equivalence_preserved
      - reversibility_order_correct
      - substitution_valid
      - solution_verifies
      - show_work_minimum
    boss_challenge:
      id: boss_systems_by_substitution_v1
      task_description: >
        Solve the system using substitution:
          y = 2x − 4
          3x + y = 10
        Show all five phases:
          (1) substitute the expression for y into the second equation,
          (2) solve for x,
          (3) back-substitute to find y,
          (4) write the solution as an ordered pair (x, y),
          (5) verify your solution in BOTH original equations.
      sensor_purpose: >
        The canonical Law 3 sensor. Substituting y = 2x − 4 into 3x + y = 10
        and never verifying in the first equation (y = 2x − 4) is the failure
        signal. The student has treated the expression as a local computation
        device rather than a binding interchangeable identity. The five-phase
        requirement makes all stages of the process visible — it is not possible
        to skip back-substitution or dual verification without an explicit
        omission. Laws 1+2 are tested during the single-variable solve in
        phase (2) and back-substitution in phase (3).
      grading:
        - check: substitution_valid
          weight: 0.35
        - check: equivalence_preserved
          weight: 0.25
        - check: reversibility_order_correct
          weight: 0.20
        - check: verify_solution_substitution
          weight: 0.20
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

  - id: systems_by_elimination
    name: "Systems of Equations — Elimination Method"
    unit: "4 — Systems of Linear Equations"
    description: >
      The student can solve a 2×2 system by multiplying one or both equations
      to create opposing coefficients for one variable, adding or subtracting
      the equations to eliminate that variable, solving for the remaining
      variable, back-substituting, and verifying in both original equations.
      Laws 1, 2, and 3 are simultaneously active. Elimination requires the
      student to apply Law 1 to whole equations — adding two balanced
      expressions produces a new balanced expression.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - equivalence_preserved
      - reversibility_order_correct
      - substitution_valid
      - solution_verifies
      - show_work_minimum
    boss_challenge:
      id: boss_systems_by_elimination_v1
      task_description: >
        Solve the system using elimination:
          2x + 3y = 16
          5x − 3y = 5
        (a) Explain in one sentence why you are allowed to add these two
            equations together. Which mathematical law permits this step?
        (b) Add the equations, solve for x, then back-substitute to find y.
            Show each step.
        (c) Verify your solution (x, y) in BOTH original equations.
      sensor_purpose: >
        Part (a) is a direct Law 1 probe: can the student articulate that
        adding two balanced equations produces a new balanced equation? This is
        Law 1 applied to whole equations rather than to individual operations on
        one side — a conceptual extension that many students execute procedurally
        without understanding. The opposing 3y/−3y coefficients make the
        elimination step algebraically simple so that diagnostic weight sits on
        the justification (a) and the dual verification (c). A student who
        cannot answer (a) has memorized the algorithm without its law-based
        foundation. A student who verifies in only one equation in (c) has not
        yet achieved Law 3 mastery.
      grading:
        - check: equivalence_preserved
          weight: 0.30
        - check: substitution_valid
          weight: 0.30
        - check: verify_solution_substitution
          weight: 0.25
        - check: step_count >= 4
          weight: 0.15
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

# ── Subsystem Configurations ─────────────────────────────────

subsystem_configs:
  zpd_monitor:
    min_challenge: 0.25
    max_challenge: 0.75
    drift_window_turns: 10
    minor_drift_threshold: 0.3
    major_drift_threshold: 0.5
    persistence_required: 3

  fluency_monitor:
    target_consecutive_successes: 3
    time_threshold_seconds: 120
    tier_progression:
      - tier_1: slope_and_rates
      - tier_2: linear_equations_y_equals_mx_b
      - tier_3: systems_of_two_variables

  equation_difficulty_tiers:
    - tier_id: tier_1
      label: "Entry — Slope & Rates"
      equation_type: slope_and_rates
      equation_template: "slope from table/graph  or  read slope and intercept from y = mx + b"
      min_difficulty: 0.0
      max_difficulty: 0.35

    - tier_id: tier_2
      label: "Intermediate — Linear Equations in Two Variables"
      equation_type: linear_equations_y_equals_mx_b
      equation_template: "y = mx + b  —  write equation from point+slope, convert forms, graph"
      min_difficulty: 0.35
      max_difficulty: 0.65

    - tier_id: tier_3
      label: "Advanced — Systems of Two Linear Equations"
      equation_type: systems_of_two_variables
      equation_template: "{y = ax + b, cx + dy = e}  solved by graphing, substitution, or elimination"
      min_difficulty: 0.65
      max_difficulty: 1.0

# ── Evidence Schema ───────────────────────────────────────────

evidence_schema:
  path: "evidence-schema.json"
  version: "1.0"
  notes: >
    New evidence fields introduced by this module:
    - substitution_valid: bool — currently estimated by the LLM interpreter;
      deterministic tool_adapter support planned for module v0.2.
    - relationship_correctly_mapped: bool — same status as above.
    - context_interpretation_correct: bool — LLM-estimated; confirms that the
      student can interpret slope and y-intercept in a real-world context
      (not just compute them symbolically).
    Inherited fields from pre-algebra:
      reversibility_order_correct, inequality_direction_correct,
      correctness, substitution_check, step_count, equivalence_preserved,
      illegal_operations, off_task_ratio, frustration_marker_count, hint_used.

# ── Glossary ─────────────────────────────────────────────────

glossary:
  - term: slope
    definition: >-
      The rate of change of a line — how much y increases or decreases for
      every 1-unit increase in x. Calculated as Δy ÷ Δx (change in y divided
      by change in x), also written as rise/run. In y = mx + b, slope is m.
    aliases: [rate of change, rise over run, m, Δy/Δx, rise/run]
    related_terms: [y-intercept, linear equation, rate of change]
    example_in_context: >-
      In a table where x goes from 0 to 2 and y goes from 5 to 17,
      slope = (17 − 5) ÷ (2 − 0) = 12 ÷ 2 = 6. For every extra hour,
      earnings increase by $6.

  - term: y-intercept
    definition: >-
      The value of y when x = 0 — where the line crosses the y-axis. In
      y = mx + b, the y-intercept is b. It represents the starting value
      of the relationship before x has changed at all.
    aliases: [b, starting value, initial value, y intercept]
    related_terms: [slope, linear equation, graph]
    example_in_context: >-
      In y = 6x + 5, the y-intercept is 5. When x = 0 (zero hours worked),
      y = 5 (the base pay). On the graph the line starts at (0, 5).

  - term: slope-intercept form
    definition: >-
      The equation form y = mx + b, where m is the slope and b is the
      y-intercept. This form makes a line easy to graph: start at (0, b)
      and use m as rise/run to find additional points.
    aliases: [y = mx + b, slope intercept, linear form]
    related_terms: [slope, y-intercept, standard form, point-slope form]
    example_in_context: >-
      y = −2x + 7 is in slope-intercept form. Slope = −2, y-intercept = 7.
      Start at (0, 7), then move down 2 and right 1 to find (1, 5).

  - term: point-slope form
    definition: >-
      The equation form y − y₁ = m(x − x₁), used to build the equation of
      a line when you know one point (x₁, y₁) and the slope m. Directly
      encodes Law 1: both sides represent change from the same anchor point.
    aliases: [point slope, y − y1 = m(x − x1)]
    related_terms: [slope, slope-intercept form, linear equation]
    example_in_context: >-
      A line through (3, 1) with slope 2: y − 1 = 2(x − 3).
      Expanding: y − 1 = 2x − 6 → y = 2x − 5 (slope-intercept form).

  - term: system of equations
    definition: >-
      Two or more equations that must ALL be satisfied by the same solution.
      The solution is the (x, y) pair that makes every equation in the system
      true simultaneously. Each equation is an independent constraint.
    aliases: [system, simultaneous equations, system of linear equations]
    related_terms: [substitution, elimination, intersection, solution_verifies]
    example_in_context: >-
      The system {y = x + 1, y = −2x + 7} has solution (2, 3).
      Check: 3 = 2 + 1 ✓ and 3 = −2(2) + 7 = 3 ✓. Both must hold.

  - term: substitution method
    definition: >-
      A method for solving a system: when one variable is expressed in terms of
      the other (e.g. y = 2x − 4), replace that variable everywhere using its
      equivalent expression, then solve the resulting single-variable equation.
      The solution must then be verified in ALL original equations.
    aliases: [substitution, substitute, plug in]
    related_terms: [system of equations, back-substitution, substitution_valid]
    example_in_context: >-
      y = 2x − 4 and 3x + y = 10. Replace y: 3x + (2x − 4) = 10 →
      5x = 14 → x = 2.8. Then y = 2(2.8) − 4 = 1.6. Verify in both.

  - term: elimination method
    definition: >-
      A method for solving a system: multiply one or both equations so that the
      coefficients of one variable are opposites, then add the equations to
      cancel that variable. The resulting single-variable equation is then solved
      and back-substitution finds the second variable.
    aliases: [elimination, addition method, linear combination]
    related_terms: [system of equations, substitution method, equivalence_preserved]
    example_in_context: >-
      {2x + 3y = 16, 5x − 3y = 5}. Adding: 7x = 21 → x = 3.
      Back-substitute: 2(3) + 3y = 16 → y = 10/3. Verify in both.

  - term: intersection
    definition: >-
      The point where two lines meet on a graph. For a system of two linear
      equations, the intersection is the solution — the unique (x, y) pair
      that satisfies both equations at the same time.
    aliases: [point of intersection, where the lines cross, solution point]
    related_terms: [system of equations, graph, solution_verifies]
    example_in_context: >-
      y = x + 1 and y = −2x + 7 intersect at (2, 3). That point is on
      both lines simultaneously.

  - term: back-substitution
    definition: >-
      After solving for one variable in a system, substitute its value back
      into one of the original equations to solve for the second variable.
      Required to produce the complete solution pair (x, y).
    aliases: [back substitution, substitute back, plug back in]
    related_terms: [substitution method, system of equations, solution_verifies]
    example_in_context: >-
      After finding x = 3 from the elimination step, back-substitute into
      2x + 3y = 16: 6 + 3y = 16 → 3y = 10 → y = 10/3.

  - term: rate of change
    definition: >-
      How much one quantity changes relative to a 1-unit change in another.
      In algebra it is the slope of a line: Δy/Δx. A constant rate of change
      means the relationship is linear.
    aliases: [rate, change rate, slope, Δy/Δx]
    related_terms: [slope, linear relationship, y-intercept]
    example_in_context: >-
      If earnings increase by $12 for each hour worked, the rate of change
      is $12/hour. That constant rate produces a straight line on a graph.
