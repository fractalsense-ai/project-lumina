# Pre-Algebra Domain Pack — Grades 6–7
# Version: 0.1.0
# Conforms to: lumina-core-v1.0.0
# ============================================================
# Diagnostic Law Coverage:
#   Law 1 — Balance Principle (equivalence_preserved):   CRITICAL
#   Law 2 — Inverse Operations (reversibility):          WARNING (evidence field pending full tool_adapter support)
#   Laws 3–6:                                            NOT ACTIVE in this module
# ============================================================

id: domain/edu/pre-algebra/v1
version: "0.1.0"

domain_authority:
  name: "Lead Pre-Algebra Teacher"
  role: "Teacher"
  pseudonymous_id: "da_prealgebra_lead_001"

meta_authority_id: domain/edu/curriculum/v1

description: >
  Pre-Algebra for grades 6–7. Covers variables and expressions, order of
  operations, single-variable linear equations, multi-step linear equations,
  and linear inequalities. Students work through 5 gated artifacts that
  activate Laws 1 (Balance Principle) and 2 (Inverse Operations) of the
  Algebra diagnostic framework. Prerequisite gateway to Algebra Intro (grade 8).

lumina_core_version: "1.0.0"

# ── Invariants ───────────────────────────────────────────────

invariants:

  # === CRITICAL INVARIANTS ===

  - id: equivalence_preserved
    description: >
      Law 1 (Balance Principle): both sides of an equation must remain
      algebraically equal after every transformation step. The student
      applying an operation to only one side is the canonical Law 1 failure.
    severity: critical
    check: "equivalence_preserved"
    standing_order_on_violation: request_more_steps

  - id: no_illegal_operations
    description: >
      Division by zero, taking a square root of a negative number (outside
      imaginary number context), or applying any undefined operation is
      not permitted.
    severity: critical
    check: "illegal_operations == []"
    standing_order_on_violation: request_more_steps

  - id: solution_verifies
    description: >
      The proposed solution must satisfy the original equation or inequality
      when substituted back in. Active from artifact single_step_equations
      onward. For inequalities, at least one boundary-value check is required.
    severity: critical
    check: "substitution_check"
    standing_order_on_violation: request_verification_retry

  - id: inequality_direction_preserved
    description: >
      When multiplying or dividing both sides of an inequality by a negative
      number, the inequality sign must flip direction. This is the critical
      direction-flip rule unique to inequalities and the primary advanced
      diagnostic signal in this module.
    severity: critical
    check: "inequality_direction_correct"
    standing_order_on_violation: request_inequality_direction_correction

  # === WARNING INVARIANTS ===

  - id: reversibility_order_correct
    description: >
      Law 2 (Inverse Operations): to undo a multi-step expression the student
      must reverse the order of operations — PEMDAS in reverse. Attempting to
      multiply by a coefficient before eliminating an added constant (e.g.
      dividing by 3 before adding 7 when solving 3x - 7 = 14) is the canonical
      failure signal. NOTE: 'reversibility_order_correct' is a new evidence
      field, currently estimated by the LLM interpreter. Full deterministic
      tool_adapter support is planned for v0.2 of this module.
    severity: warning
    check: "reversibility_order_correct"
    standing_order_on_violation: hint_reverse_order_of_operations

  - id: standard_method_preferred
    description: >
      Non-standard solution methods are acceptable but should be flagged for
      Domain Authority review. The student should be aware that standard
      methods are preferred for this course.
    severity: warning
    check: "method_recognized"
    standing_order_on_violation: request_method_justification
    signal_type: NOVEL_PATTERN

  - id: show_work_minimum
    description: >
      Solutions must show at least the minimum number of distinct transformation
      steps required by the problem type. A bare answer with no work shown is
      not acceptable.
    severity: warning
    check: "step_count >= min_steps"
    standing_order_on_violation: request_more_steps

  - id: zpd_drift_minor
    description: >
      The student's challenge level has drifted outside the ZPD band in >= 30%
      of the recent window turns.
    severity: warning
    check: "outside_pct >= 0.3"
    handled_by: zpd_monitor
    standing_order_on_violation: zpd_scaffold

  - id: zpd_drift_major
    description: >
      The student's challenge level has drifted outside the ZPD band in >= 50%
      of recent window turns, or for 3+ consecutive turns. Both conditions are
      evaluated internally by the ZPD monitor; the check field is informational.
    severity: warning
    check: "outside_pct >= 0.5"
    handled_by: zpd_monitor
    standing_order_on_violation: zpd_intervene_or_escalate

  - id: fluency_bottleneck
    description: >
      The student is solving equations correctly but consistently exceeding the
      time threshold, indicating procedural automaticity has not been achieved
      at the current tier.
    severity: warning
    check: "average_completion_time > fluency_monitor.time_threshold_seconds"
    handled_by: fluency_monitor
    standing_order_on_violation: trigger_targeted_hint

# ── Standing Orders ──────────────────────────────────────────

standing_orders:

  - id: request_more_steps
    action: request_more_steps
    trigger_condition: "equivalence_preserved or no_illegal_operations or show_work_minimum"
    max_attempts: 3
    escalation_on_exhaust: true
    description: >
      Ask the student to show their work step by step, identifying each
      transformation they applied to both sides of the equation.

  - id: request_verification_retry
    action: request_verification_retry
    trigger_condition: solution_verifies
    max_attempts: 2
    escalation_on_exhaust: true
    description: >
      Ask the student to substitute their answer back into the original
      equation or inequality and confirm both sides balance (or that the
      inequality holds).

  - id: request_inequality_direction_correction
    action: request_inequality_direction_correction
    trigger_condition: inequality_direction_preserved
    max_attempts: 2
    escalation_on_exhaust: true
    description: >
      Prompt the student to re-examine the step where they divided or multiplied
      by a negative number and ask which direction the inequality sign should
      point. Do not state the flip rule directly on the first prompt.

  - id: hint_reverse_order_of_operations
    action: inject_domain_rule
    trigger_condition: reversibility_order_correct
    max_attempts: 2
    escalation_on_exhaust: false
    description: >
      Provide the Law 2 scaffolding: ask the student to list the operations
      that were applied to x (in the order they appear), then ask them to
      undo those operations starting from the last one. Do not solve the problem.

  - id: request_method_justification
    action: request_method_justification
    trigger_condition: standard_method_preferred
    max_attempts: 1
    escalation_on_exhaust: false
    description: >
      Acknowledge the non-standard approach and ask the student to explain
      their reasoning. Flag for Domain Authority review.

  - id: zpd_scaffold
    action: zpd_scaffold
    trigger_condition: zpd_drift_minor
    max_attempts: 3
    escalation_on_exhaust: false
    description: >
      Reduce challenge level on the next task. Offer an optional hint.
      Provide additional scaffolding in the explanation.

  - id: zpd_intervene_or_escalate
    action: zpd_intervene_or_escalate
    trigger_condition: "zpd_drift_major or frustration_flag"
    max_attempts: 1
    escalation_on_exhaust: true
    description: >
      Pause the current task. Issue one probe question to check understanding.
      If the probe response does not improve state, escalate to teacher.

  - id: trigger_targeted_hint
    action: trigger_targeted_hint
    trigger_condition: fluency_bottleneck
    max_attempts: 3
    escalation_on_exhaust: false
    description: >
      Provide a targeted procedural hint for the specific step the student is
      slowing on (e.g. which inverse operation to apply, which step comes
      first). Do not solve the problem.

# ── Escalation Triggers ──────────────────────────────────────

escalation_triggers:

  - id: critical_invariant_unresolvable
    condition: >
      A critical invariant (equivalence_preserved, no_illegal_operations,
      solution_verifies, or inequality_direction_preserved) was violated and
      its standing order has been exhausted without resolution.
    target_role: teacher
    sla_minutes: 30

  - id: major_zpd_drift_unresolved
    condition: >
      The zpd_intervene_or_escalate standing order was applied and the probe
      response did not reduce outside_pct below the minor threshold.
    target_role: teacher
    sla_minutes: 30

  - id: novel_pattern_review
    condition: >
      The standard_method_preferred invariant fired and the student could not
      explain their non-standard reasoning after one justification request.
    target_role: teacher
    sla_minutes: 120

# ── Artifacts ─────────────────────────────────────────────────
# 5 gated artifacts spanning Units 1–2. Each unlocks after mastery >= 0.8
# on its required skills, confirmed by its boss challenge.
# Boss challenges: no hints, 1 attempt per session, pass_threshold 0.8.
# Equation form is chosen to make the diagnostic law signal unavoidable.

artifacts:

  - id: variables_and_expressions
    name: "Variables & Expressions — Introduction"
    unit: "1 — Foundations"
    description: >
      The student can evaluate algebraic expressions by substituting known
      values for variables and applying arithmetic operations in the correct
      order. Foundation for understanding that variables are placeholders.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - equivalence_preserved
      - show_work_minimum
    boss_challenge:
      id: boss_variables_expressions_v1
      task_description: >
        Evaluate 3(x + 4y) − 2z given x = 2, y = 1, z = 3.
        Show each substitution step and every arithmetic operation separately.
      sensor_purpose: >
        Tests whether the student treats the expression as a balanced structure
        (Law 1 introduction): substituting x=2 correctly means the expression
        retains its value. Distributing 3 across (x + 4y) before substituting
        is the canonical shortcut error that reveals incomplete structural
        understanding.
      grading:
        - check: correct_final_value
          weight: 0.5
        - check: substitution_shown
          weight: 0.3
        - check: step_count >= 2
          weight: 0.2
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

  - id: order_of_operations
    name: "Order of Operations — PEMDAS"
    unit: "1 — Foundations"
    description: >
      The student can evaluate complex arithmetic and algebraic expressions
      by applying PEMDAS correctly: Parentheses, Exponents, Multiplication and
      Division (left to right), Addition and Subtraction (left to right).
      This is the prerequisite for Law 2 — students must know the order before
      they can reverse it.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - reversibility_order_correct
      - show_work_minimum
    boss_challenge:
      id: boss_order_of_operations_v1
      task_description: >
        Simplify: 4 + 3 × (8 − 2)² ÷ 9. Show each operation on a separate
        line in the order you perform it.
      sensor_purpose: >
        Forces exponents before multiplication — the exact order that must later
        be reversed when isolating variables. A student who adds 3 × before
        computing (8 − 2)² has not yet internalized the order that Law 2 requires
        them to undo. This equation has exactly one correct step sequence.
      grading:
        - check: correct_final_value
          weight: 0.5
        - check: exponents_before_multiply
          weight: 0.3
        - check: step_count >= 3
          weight: 0.2
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

  - id: single_step_equations
    name: "Single-Step Linear Equations"
    unit: "2 — Linear Equations & Inequalities"
    description: >
      The student can solve single-step equations of the form x + a = b and
      ax = b using one inverse operation, showing that operation applied to
      both sides of the equation, and verifying the solution by substitution.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - equivalence_preserved
      - reversibility_order_correct
      - solution_verifies
      - show_work_minimum
    boss_challenge:
      id: boss_single_step_equations_v1
      task_description: >
        Solve 7x = 84. Show the inverse operation applied to both sides, state
        your answer, and verify by substituting back into the original equation.
      sensor_purpose: >
        Simultaneously tests Law 1 (both sides get the same division) and the
        entry level of Law 2 (identifying multiplication as the operation to undo).
        A student who just writes "x = 12" without showing the division step has
        passed arithmetic but not algebraic procedure.
      grading:
        - check: equivalence_preserved
          weight: 0.4
        - check: verify_solution_substitution
          weight: 0.4
        - check: step_count >= 2
          weight: 0.2
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

  - id: multi_step_linear_equations
    name: "Multi-Step Linear Equations"
    unit: "2 — Linear Equations & Inequalities"
    description: >
      The student can solve two-step equations of the form ax + b = c and
      ax − b = c by applying inverse operations in the correct reversed-PEMDAS
      order, showing each step applied to both sides, and verifying the solution.
      This is the primary Law 2 diagnostic artifact in this module.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - equivalence_preserved
      - reversibility_order_correct
      - solution_verifies
      - show_work_minimum
    boss_challenge:
      id: boss_multi_step_linear_v1
      task_description: >
        Solve 3x − 7 = 14. Show each inverse operation applied to both sides
        in the correct order, state your answer, and verify by substitution.
      sensor_purpose: >
        The canonical Law 2 diagnostic: does the student add 7 to both sides
        first (correct — undoing subtraction before undoing multiplication), or
        divide by 3 first (reversed-order failure)? The two-step structure of
        this equation makes the order of operations non-negotiable. Their
        work-steps reveal the answer without any explicit question about the law.
      grading:
        - check: equivalence_preserved
          weight: 0.35
        - check: reversibility_order_correct
          weight: 0.30
        - check: verify_solution_substitution
          weight: 0.25
        - check: step_count >= 3
          weight: 0.10
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

  - id: linear_inequalities
    name: "Linear Inequalities & the Direction-Flip Rule"
    unit: "2 — Linear Equations & Inequalities"
    description: >
      The student can solve linear inequalities including cases requiring the
      direction-flip rule when multiplying or dividing by a negative number,
      state the solution as an inequality, and describe the solution set on a
      number line.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - equivalence_preserved
      - reversibility_order_correct
      - inequality_direction_preserved
      - solution_verifies
      - show_work_minimum
    boss_challenge:
      id: boss_linear_inequalities_v1
      task_description: >
        Solve −4x + 3 > −9. Show each step applied to both sides, flip the
        inequality sign at the correct moment, state your final answer as an
        inequality, and describe whether you would shade left or right on the
        number line.
      sensor_purpose: >
        The negative coefficient on x forces the direction-flip signal. A student
        who correctly isolates −4x > −12 but then writes x > 3 (wrong direction)
        has provided an unambiguous Law 2 direction-flip failure. The number line
        question confirms whether they understand the solution is a set, not a
        single value — distinguishing inequality reasoning from equation solving.
      grading:
        - check: equivalence_preserved
          weight: 0.25
        - check: inequality_direction_correct
          weight: 0.40
        - check: verify_inequality_solution
          weight: 0.25
        - check: step_count >= 3
          weight: 0.10
      pass_threshold: 0.8
      hints_allowed: false
      max_attempts_per_session: 1

# ── Subsystem Configurations ─────────────────────────────────

subsystem_configs:
  zpd_monitor:
    min_challenge: 0.25
    max_challenge: 0.75
    drift_window_turns: 10
    minor_drift_threshold: 0.3
    major_drift_threshold: 0.5
    persistence_required: 3

  fluency_monitor:
    target_consecutive_successes: 3
    time_threshold_seconds: 90
    tier_progression:
      - tier_1: single_operation
      - tier_2: single_step_equations
      - tier_3: multi_step_and_inequalities

  equation_difficulty_tiers:
    - tier_id: tier_1
      label: "Entry — Single Operation"
      equation_type: single_operation
      equation_template: "x + a = b  or  evaluate f(x) given x"
      min_difficulty: 0.0
      max_difficulty: 0.35

    - tier_id: tier_2
      label: "Intermediate — Single-Step Equations"
      equation_type: single_step_equations
      equation_template: "ax = b  or  x + a = b with multi-digit numbers"
      min_difficulty: 0.35
      max_difficulty: 0.65

    - tier_id: tier_3
      label: "Advanced — Multi-Step & Inequalities"
      equation_type: multi_step_and_inequalities
      equation_template: "ax + b = c  or  ax + b < c  or  ax + b ≥ c"
      min_difficulty: 0.65
      max_difficulty: 1.0

# ── Evidence Schema ───────────────────────────────────────────

evidence_schema:
  path: "evidence-schema.json"
  version: "1.0"
  notes: >
    New evidence fields introduced by this module:
    - reversibility_order_correct: bool — currently estimated by LLM interpreter;
      deterministic tool_adapter support planned for module v0.2.
    - inequality_direction_correct: bool — same status as above.
    Existing fields (correctness, substitution_check, step_count, equivalence_preserved,
    illegal_operations, off_task_ratio, frustration_marker_count, hint_used)
    are inherited from the algebra-level-1 evidence schema.

# ── Glossary ─────────────────────────────────────────────────

glossary:
  - term: variable
    definition: >-
      A letter (like x or y) that represents an unknown number you are trying
      to find. When you solve an equation, you find the value that makes the
      variable's placeholder true.
    aliases: [variables, unknown, unknowns, the letter]
    related_terms: [expression, coefficient, constant]
    example_in_context: >-
      In 3x + 4 = 10, the variable is x. The goal is to find which number
      x must be for the equation to be true.

  - term: expression
    definition: >-
      A combination of numbers, variables, and operations that does NOT have
      an equals sign. It has a value, but it is not a complete statement about
      equal quantities.
    aliases: [expressions, algebraic expression, math expression]
    related_terms: [equation, variable, term]
    example_in_context: >-
      3x + 4 is an expression. 3x + 4 = 10 is an equation.

  - term: order of operations
    definition: >-
      The rule that dictates the sequence for evaluating an expression: first
      Parentheses, then Exponents, then Multiplication and Division (left to
      right), then Addition and Subtraction (left to right). Often remembered
      as PEMDAS or BODMAS.
    aliases: [PEMDAS, BODMAS, order of ops]
    related_terms: [expression, inverse operation]
    example_in_context: >-
      In 3 + 4 × 2, you multiply first to get 3 + 8 = 11, not 7 × 2 = 14.

  - term: inverse operation
    definition: >-
      The opposite operation that undoes another. Addition and subtraction are
      inverses of each other. Multiplication and division are inverses of each
      other. To solve an equation, you apply inverse operations to both sides
      in the reverse order that the operations were applied to x.
    aliases: [inverse operations, opposite operation, undo operation, reverse]
    related_terms: [order of operations, isolate, equation]
    example_in_context: >-
      To undo +7 in x + 7 = 15, apply the inverse: subtract 7 from both sides.
      To undo ×3 in 3x = 15, apply the inverse: divide both sides by 3.

  - term: isolate
    definition: >-
      To get the variable completely alone on one side of the equation by
      performing inverse operations on both sides until only the variable
      remains on one side.
    aliases: [isolating the variable, get x alone, get x by itself, solve for x]
    related_terms: [inverse operation, equation, variable]
    example_in_context: >-
      To isolate x in 2x + 5 = 17: subtract 5 from both sides (→ 2x = 12),
      then divide both sides by 2 (→ x = 6).

  - term: inequality
    definition: >-
      A mathematical statement that two expressions are not equal, using the
      symbols < (less than), > (greater than), ≤ (less than or equal to), or
      ≥ (greater than or equal to). Unlike an equation, the solution is usually
      a range of values, not a single number.
    aliases: [inequalities, inequality statement, inequality sign]
    related_terms: [equation, solution set, number line]
    example_in_context: >-
      x > 3 means x can be 3.1, 4, 100, or any number strictly greater than 3.

  - term: inequality direction flip
    definition: >-
      When both sides of an inequality are multiplied or divided by a negative
      number, the inequality sign must reverse direction. This rule has no
      equivalent in equations and is the most common error when solving
      inequalities for the first time.
    aliases: [flip the sign, reverse the inequality, flip rule, sign flip]
    related_terms: [inequality, inverse operation]
    example_in_context: >-
      −2x < 8 → divide both sides by −2 → x > −4 (sign flips from < to >).

  - term: coefficient
    definition: >-
      The number multiplied directly by a variable. When no number is written
      in front of a variable, the coefficient is understood to be 1.
    aliases: [coefficients, the number in front of x, number before the variable]
    related_terms: [variable, constant, term]
    example_in_context: >-
      In 4x = 28, the coefficient of x is 4. In x + 3 = 7, the coefficient
      of x is 1 (written invisibly).

  - term: constant
    definition: >-
      A number on its own that does not change and is not attached to a variable.
    aliases: [constants, plain number, fixed number]
    related_terms: [variable, coefficient, expression]
    example_in_context: >-
      In 3x + 7 = 19, the numbers 7 and 19 are constants.
