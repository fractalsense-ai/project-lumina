# Algebra Domain Pack — Level 1
# Version: 0.4.0 (challenge-band alignment and subsystem config updates)
# Conforms to: lumina-core-v1.0.0
# ============================================================

id: domain/edu/algebra-level-1/v1
version: "0.4.0"

domain_authority:
  name: "Lead Algebra Teacher"
  role: "Teacher"
  pseudonymous_id: "da_algebra_lead_001"

meta_authority_id: domain/edu/curriculum/v1

description: >
  Algebra Level 1 for middle school students (grades 6-8).
  Covers single-variable linear equations, equivalence preservation,
  and solution verification. Students work toward the
  'Linear Equations — Foundations' mastery artifact.

lumina_core_version: "1.0.0"

# ── Invariants ───────────────────────────────────────────────

invariants:

  # === CRITICAL INVARIANTS ===

  - id: equivalence_preserved
    description: >
      Both sides of an equation must remain algebraically equal after
      every transformation step. A step that breaks equivalence is invalid.
    severity: critical
    check: "equivalence_preserved"
    standing_order_on_violation: request_more_steps

  - id: no_illegal_operations
    description: >
      The student may not divide by zero, take a square root of a negative
      (in real-number context), or apply undefined operations.
    severity: critical
    check: "illegal_operations == []"
    standing_order_on_violation: request_more_steps

  - id: solution_verifies
    description: >
      The proposed solution value must satisfy the original equation
      when substituted back in.
    severity: critical
    check: "substitution_check"
    standing_order_on_violation: request_verification_retry

  # === WARNING INVARIANTS ===

  - id: standard_method_preferred
    description: >
      Non-standard solution methods are acceptable but should be flagged
      for Domain Authority review. The student should be aware that
      standard methods are preferred for this course.
    severity: warning
    check: "method_recognized"
    standing_order_on_violation: request_method_justification
    signal_type: NOVEL_PATTERN

  - id: show_work_minimum
    description: >
      Solutions must show at least three distinct transformation steps.
      A single-step jump from problem to answer is not acceptable.
    severity: warning
    check: "step_count >= 3"
    standing_order_on_violation: request_more_steps

  - id: zpd_drift_minor
    description: >
      The student's challenge level has drifted outside the ZPD band
      in >= 30% of the recent window turns.
    severity: warning
    check: "outside_pct >= 0.3"
    handled_by: zpd_monitor
    standing_order_on_violation: zpd_scaffold

  - id: zpd_drift_major
    description: >
      The student's challenge level has drifted outside the ZPD band
      in >= 50% of the recent window turns, or for 3+ consecutive turns.
      Both conditions are evaluated internally by the ZPD monitor; the
      check field here is informational.
    severity: warning
    check: "outside_pct >= 0.5"
    handled_by: zpd_monitor
    standing_order_on_violation: zpd_intervene_or_escalate

  - id: fluency_bottleneck
    description: >
      The student has solved equations correctly but failed to meet the
      time threshold across consecutive attempts, indicating procedural
      fluency has not been achieved at the current tier.
    severity: warning
    check: "average_completion_time > fluency_monitor.time_threshold_seconds"
    handled_by: fluency_monitor
    standing_order_on_violation: trigger_targeted_hint

# ── Standing Orders ──────────────────────────────────────────

standing_orders:

  - id: request_more_steps
    action: request_more_steps
    trigger_condition: "equivalence_preserved or no_illegal_operations or show_work_minimum"
    max_attempts: 3
    escalation_on_exhaust: true
    description: >
      Ask the student to show their work step by step, identifying
      each transformation they applied.

  - id: request_verification_retry
    action: request_verification_retry
    trigger_condition: solution_verifies
    max_attempts: 2
    escalation_on_exhaust: true
    description: >
      Ask the student to substitute their answer back into the
      original equation and check that both sides are equal.

  - id: request_method_justification
    action: request_method_justification
    trigger_condition: standard_method_preferred
    max_attempts: 1
    escalation_on_exhaust: false
    description: >
      Acknowledge the non-standard approach and ask the student
      to explain their reasoning. Flag for Domain Authority review.

  - id: zpd_scaffold
    action: zpd_scaffold
    trigger_condition: zpd_drift_minor
    max_attempts: 3
    escalation_on_exhaust: false
    description: >
      Reduce challenge level on the next task. Offer an optional hint.
      Provide additional scaffolding in the explanation.

  - id: zpd_intervene_or_escalate
    action: zpd_intervene_or_escalate
    trigger_condition: "zpd_drift_major or frustration_flag"
    max_attempts: 1
    escalation_on_exhaust: true
    description: >
      Pause the current task. Issue one probe to check understanding.
      If the probe response does not improve state, escalate to teacher.

  - id: trigger_targeted_hint
    action: trigger_targeted_hint
    trigger_condition: fluency_bottleneck
    max_attempts: 3
    escalation_on_exhaust: false
    description: >
      Provide a targeted procedural hint addressing the specific
      operation the student is struggling with (e.g. inverse operations,
      combining like terms). Do not solve the problem.

  - id: hint_inverse_operations
    action: inject_domain_rule
    trigger_condition: "evidence contains inverse_error"
    max_attempts: 2
    escalation_on_exhaust: true
    description: >
      Provide the strict domain rule for moving constants across the
      equals sign using inverse operations. Do not solve the problem;
      only state the structural algebraic rule.

# ── Escalation Triggers ──────────────────────────────────────

escalation_triggers:

  - id: critical_invariant_unresolvable
    condition: >
      A critical invariant (equivalence_preserved, no_illegal_operations,
      or solution_verifies) was violated and the standing order
      has been exhausted (3 attempts).
    target_role: teacher
    sla_minutes: 30

  - id: major_zpd_drift_unresolved
    condition: >
      zpd_intervene_or_escalate standing order was applied and the
      probe response did not reduce outside_pct below the minor threshold.
    target_role: teacher
    sla_minutes: 30

  - id: novel_pattern_review
    condition: >
      standard_method_preferred invariant fired and the method
      is unrecognized after justification request.
    target_role: teacher
    sla_minutes: 120

# ── Artifacts ────────────────────────────────────────────────

artifacts:

  - id: linear_equations_basic
    name: "Linear Equations — Foundations"
    description: >
      Demonstrates ability to solve single-variable linear equations
      with equivalence preservation, showing all required steps,
      and verifying the solution.
    unlock_condition: "mastery >= 0.8 on all required skills, confirmed by boss challenge"
    mastery_threshold: 0.8
    skills_required:
      - solve_one_variable
      - check_equivalence
      - show_work_steps
      - verify_solution

# ── Subsystem Configurations ─────────────────────────────────

subsystem_configs:
  zpd_monitor:
    min_challenge: 0.3
    max_challenge: 0.7
    drift_window_turns: 10
    minor_drift_threshold: 0.3
    major_drift_threshold: 0.5
    persistence_required: 3

  fluency_monitor:
    target_consecutive_successes: 3
    time_threshold_seconds: 45
    tier_progression:
      - tier_1: single_step_isolation
      - tier_2: variable_consolidation
      - tier_3: multi_step_linear

  equation_difficulty_tiers:
    - tier_id: tier_1
      label: "Entry — Single-Step Isolation"
      equation_type: single_step_isolation
      equation_template: "x + a = b"
      min_difficulty: 0.0
      max_difficulty: 0.35
    - tier_id: tier_2
      label: "Intermediate — Variable Consolidation"
      equation_type: variable_consolidation
      equation_template: "ax = b"
      min_difficulty: 0.35
      max_difficulty: 0.65
    - tier_id: tier_3
      label: "Advanced — Multi-Step Linear"
      equation_type: multi_step_linear
      equation_template: "ax + b = c  or  ax - b = c"
      min_difficulty: 0.65
      max_difficulty: 1.0

# ── Evidence Summary Types ───────────────────────────────────

evidence_summary_types:
  - step_diff_summary        # tracks transformation steps applied
  - illegal_ops_summary      # flags any illegal mathematical operations
  - verification_summary     # substitution check result
  - method_summary           # whether the method matches standard patterns
  - step_count_summary       # count of distinct steps shown
  - affect_summary           # frustration marker count, off_task_ratio
  - zpd_drift_summary        # outside_pct, consecutive_outside, frustration_flag
  - fluency_summary          # consecutive_correct, current_tier, solve_elapsed_sec

# ── Glossary ─────────────────────────────────────────────────

glossary:
  - term: variable
    definition: >-
      A letter (usually x, y, or z) that stands for an unknown number
      you are trying to find.
    aliases: [variables, unknown, unknowns, the letter]
    related_terms: [constant, coefficient, expression]
    example_in_context: >-
      In the equation x + 7 = 15, the variable is x.

  - term: coefficient
    definition: >-
      The number multiplied by a variable. When no number is written,
      the coefficient is 1.
    aliases: [coefficients, the number in front of x, number before the variable]
    related_terms: [variable, constant, term]
    example_in_context: >-
      In 4x = 28, the coefficient of x is 4.

  - term: constant
    definition: >-
      A number on its own that does not change and is not attached
      to a variable.
    aliases: [constants, plain number, fixed number]
    related_terms: [variable, coefficient, expression]
    example_in_context: >-
      In x + 7 = 15, the numbers 7 and 15 are constants.

  - term: equation
    definition: >-
      A mathematical statement that two expressions are equal,
      connected by an equals sign (=).
    aliases: [equations]
    related_terms: [expression, variable, solution]
    example_in_context: >-
      x + 7 = 15 is an equation because the left side equals the right side.

  - term: expression
    definition: >-
      A combination of numbers, variables, and operations (like + or -)
      that represents a value. An expression does NOT have an equals sign.
    aliases: [expressions, math expression]
    related_terms: [equation, variable, term]
    example_in_context: >-
      In the equation x + 7 = 15, the part "x + 7" is an expression.

  - term: isolate
    definition: >-
      To get the variable by itself on one side of the equation by
      performing operations on both sides.
    aliases: [isolating, get x by itself, get the variable alone]
    related_terms: [inverse operation, variable, equation]
    example_in_context: >-
      To isolate x in x + 7 = 15, subtract 7 from both sides to get x = 8.

  - term: inverse operation
    definition: >-
      The opposite operation that undoes another operation.
      Addition and subtraction are inverses; multiplication and division
      are inverses.
    aliases: [inverse operations, opposite operation, undo operation, reverse operation]
    related_terms: [isolate, equation, variable]
    example_in_context: >-
      To undo "+ 7" in x + 7 = 15, use the inverse operation "- 7".

  - term: substitution
    definition: >-
      Replacing the variable with a number to check whether the
      equation is true.
    aliases: [substitute, substituting, plug in, plugging in]
    related_terms: [solution, equation, variable]
    example_in_context: >-
      Substitute x = 8 into x + 7 = 15: 8 + 7 = 15. It checks out!

  - term: linear equation
    definition: >-
      An equation where the variable has no exponent (or an exponent of 1).
      Its graph is a straight line.
    aliases: [linear equations, linear, first-degree equation]
    related_terms: [equation, variable, coefficient]
    example_in_context: >-
      3x + 5 = 11 is a linear equation because x is raised to the first power.

  - term: solution
    definition: >-
      The value of the variable that makes the equation true.
    aliases: [solutions, answer, root]
    related_terms: [equation, variable, substitution]
    example_in_context: >-
      The solution to x + 7 = 15 is x = 8 because 8 + 7 = 15.

  - term: term
    definition: >-
      A single number, a single variable, or a number multiplied by
      a variable. Terms are separated by + or - signs.
    aliases: [terms]
    related_terms: [coefficient, variable, constant, expression]
    example_in_context: >-
      In 3x + 5 = 11, the terms are 3x, 5, and 11.

  - term: like terms
    definition: >-
      Terms that have the same variable raised to the same power.
      Like terms can be combined by adding or subtracting their coefficients.
    aliases: [combining like terms, combine like terms, similar terms]
    related_terms: [term, coefficient, variable, expression]
    example_in_context: >-
      In 2x + 3x = 10, the terms 2x and 3x are like terms.
      Combine them: 5x = 10.

# ── Tool Adapters ────────────────────────────────────────────

tool_adapters:
  - adapter/edu/algebra-parser/v1
  - adapter/edu/calculator/v1
  - adapter/edu/substitution-checker/v1

# ── Permissions ──────────────────────────────────────────────

permissions:
  mode: "750"
  owner: "da_algebra_lead_001"
  group: "domain_authority"
  acl:
    - role: qa
      access: rx
      scope: evaluation_only
    - role: auditor
      access: r
      scope: ctl_records_only
    - role: user
      access: x
