runtime:
  global_system_prompt_path: specs/global-system-prompt-v1.md
  domain_system_prompt_path: domain-packs/education/prompts/domain-system-override.md
  evidence_extraction_prompt_path: domain-packs/education/prompts/evidence-extraction.md

  domain_physics_path: domain-packs/education/algebra-level-1/domain-physics.json
  subject_profile_path: domain-packs/education/algebra-level-1/example-student-alice.yaml

  additional_specs:
    - domain-packs/education/world-sim/magic-circle-consent-v1.md
    - domain-packs/education/world-sim/world-sim-spec-v1.md
    - domain-packs/education/world-sim/artifact-and-mastery-spec-v1.md

  pre_turn_checks:
    -
      id: consent_boundary
      enabled: true
      description: "Require valid consent record before session proceeds; enforces Principle 8"
      on_failure: escalate

  default_task_spec:
    task_id: algebra-linear-eq-001
    nominal_difficulty: 0.45
    skills_required:
      - solve_one_variable
      - check_equivalence
      - show_work_steps
      - verify_solution
    current_problem:
      equation: "2x + 3 = 11"
      target_variable: "x"
      expected_answer: "x = 4"
      status: "in_progress"

  domain_step_params:
    min_challenge: 0.3
    max_challenge: 0.7
    drift_window_turns: 10
    minor_drift_threshold: 0.3
    major_drift_threshold: 0.5
    persistence_required: 3

  evidence_defaults:
    correctness: partial
    hint_used: false
    response_latency_sec: 10.0
    frustration_marker_count: 0
    repeated_error: false
    off_task_ratio: 0.0
    step_count: 0

  deterministic_templates:
    hint: "Let's take one small step on {task_id}. Show the next equivalence-preserving move."
    more_steps_request: "Please show your work step-by-step for {task_id} and keep each operation balanced."
    scaffold: "Let's break {task_id} into smaller steps and do one move at a time."
    zpd_scaffold: "Let's simplify this and do one clear step for {task_id}."
    pause_or_break: "Let's pause briefly. When ready, we will continue with one smaller step."
    zpd_intervene_or_escalate: "Let's pause and reset. We can continue with a smaller step once you're ready."
    default: "Continue with {task_id}. Share your next step and we will verify it together."

  tool_call_policies:
    request_verification_retry:
      -
        tool_id: substitution_checker
        payload:
          left_value: "{evidence.left_value}"
          right_value: "{evidence.right_value}"

adapters:
  state_builder:
    module_path: domain-packs/education/reference-implementations/runtime-adapters.py
    callable: build_initial_learning_state
  domain_step:
    module_path: domain-packs/education/reference-implementations/runtime-adapters.py
    callable: domain_step
  evidence_extractor:
    module_path: domain-packs/education/reference-implementations/runtime-adapters.py
    callable: extract_evidence
  tools:
    calculator:
      module_path: domain-packs/education/reference-implementations/tool-adapters.py
      callable: calculator_tool
    substitution_checker:
      module_path: domain-packs/education/reference-implementations/tool-adapters.py
      callable: substitution_checker_tool
