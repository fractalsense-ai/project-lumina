runtime:
  global_system_prompt_path: specs/global-system-prompt-v1.md
  domain_system_prompt_path: domain-packs/education/prompts/domain-system-override.md
  turn_interpretation_prompt_path: domain-packs/education/prompts/turn-interpretation.md

  domain_physics_path: domain-packs/education/modules/algebra-level-1/domain-physics.json
  subject_profile_path: domain-packs/education/modules/algebra-level-1/example-student-alice.yaml

  access_control:
    required_role: user
    allowed_roles:
      - root
      - domain_authority
      - it_support
      - qa
      - user

  additional_specs:
    - domain-packs/education/world-sim/magic-circle-consent-v1.md
    - domain-packs/education/world-sim/world-sim-spec-v1.md
    - domain-packs/education/world-sim/artifact-and-mastery-spec-v1.md

  pre_turn_checks:
    -
      id: consent_boundary
      enabled: true
      description: "Require valid consent record before session proceeds; enforces Principle 8"
      on_failure: escalate

  default_task_spec:
    task_id: algebra-linear-eq-001
    nominal_difficulty: 0.45
    skills_required:
      - solve_one_variable
      - check_equivalence
      - show_work_steps
      - verify_solution

  domain_step_params:
    min_challenge: 0.3
    max_challenge: 0.7
    drift_window_turns: 10
    minor_drift_threshold: 0.3
    major_drift_threshold: 0.5
    persistence_required: 3
    fluency_monitor:
      target_consecutive_successes: 3
      time_threshold_seconds: 45
      tier_progression:
        - tier_1
        - tier_2
        - tier_3

  turn_input_defaults:
    correctness: partial
    hint_used: false
    response_latency_sec: 10.0
    frustration_marker_count: 0
    repeated_error: false
    off_task_ratio: 0.0
    step_count: 0
    problem_solved: false

  turn_input_schema:
    correctness:
      type: enum
      values:
        - correct
        - incorrect
        - partial
      default: partial
    hint_used:
      type: bool
      default: false
    response_latency_sec:
      type: float
      minimum: 0.0
      default: 10.0
    frustration_marker_count:
      type: int
      minimum: 0
      default: 0
    repeated_error:
      type: bool
      default: false
    off_task_ratio:
      type: float
      minimum: 0.0
      maximum: 1.0
      default: 0.0
    step_count:
      type: int
      minimum: 0
      default: 0
    equivalence_preserved:
      type: bool
      default: false
    substitution_check:
      type: bool
      default: false
    method_recognized:
      type: bool
      default: false
    illegal_operations:
      type: list
      default: []
    problem_solved:
      type: bool
      default: false

  action_prompt_type_map:
    request_more_steps: more_steps_request
    request_verification_retry: verification_request
    request_method_justification: method_justification_request
    trigger_targeted_hint: hint
    inject_domain_rule: inject_domain_rule
    advance_tier: task_presentation
    definition_lookup: definition_lookup

  deterministic_templates:
    hint: "Let's take one small step on {task_id}. Show the next equivalence-preserving move."
    more_steps_request: "Please show your work step-by-step for {task_id} and keep each operation balanced."
    scaffold: "Let's break {task_id} into smaller steps and do one move at a time."
    zpd_scaffold: "Let's simplify this and do one clear step for {task_id}."
    pause_or_break: "Let's pause briefly. When ready, we will continue with one smaller step."
    definition_lookup: "{term}: {definition} Example: {example_in_context}"
    zpd_intervene_or_escalate: "Let's pause and reset. We can continue with a smaller step once you're ready."
    default: "Continue with {task_id}. Share your next step and we will verify it together."

  tool_call_policies:
    request_verification_retry:
      -
        tool_id: substitution_checker
        payload:
          left_value: "{turn_data.left_value}"
          right_value: "{turn_data.right_value}"

ui_manifest:
  title: "Project Lumina"
  subtitle: "Algebra Level 1 — Foundations"
  domain_label: "Education"
  consent_heading: "Project Lumina"
  consent_text: "I am not grading you for a report card. I do not keep transcripts of what you say. If we get stuck, we ask for human help."
  consent_button_label: "I Agree to the Magic Circle"
  placeholder_text: "Type your steps here..."
  theme:
    primary: "oklch(0.45 0.08 220)"
    accent: "oklch(0.72 0.12 60)"
    background: "oklch(0.96 0.01 80)"

adapters:
  state_builder:
    module_path: domain-packs/education/systools/runtime_adapters.py
    callable: build_initial_learning_state
  domain_step:
    module_path: domain-packs/education/systools/runtime_adapters.py
    callable: domain_step
  turn_interpreter:
    module_path: domain-packs/education/systools/runtime_adapters.py
    callable: interpret_turn_input
  nlp_pre_interpreter:
    module_path: domain-packs/education/systools/nlp_pre_interpreter.py
    callable: nlp_preprocess
  tools:
    calculator:
      module_path: domain-packs/education/systools/tool_adapters.py
      callable: calculator_tool
    substitution_checker:
      module_path: domain-packs/education/systools/tool_adapters.py
      callable: substitution_checker_tool
    algebra_parser:
      module_path: domain-packs/education/systools/tool_adapters.py
      callable: algebra_parser_tool
    generate_problem:
      module_path: domain-packs/education/systools/problem_generator.py
      callable: generate_problem
