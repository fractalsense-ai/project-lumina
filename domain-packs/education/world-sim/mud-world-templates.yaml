# MUD World Builder — Template Library (Education Domain)
#
# Each template defines the 8 narrative constants that are locked into session
# state when the world builder selects a world for a student.  The selection
# algorithm mirrors select_world_sim_theme():  preference_keywords are matched
# against entity_profile.preferences.interests (and .likes as a legacy alias);
# dislikes always veto.  The first matching template wins.  The entry with no
# preference_keywords ("general_math") acts as the catch-all fallback.
#
# Fields:
#   id                — unique template identifier
#   preference_keywords — student interest keywords that trigger this world
#   zone              — the physical setting where math problems take place
#   protagonist       — the player's in-world role / title
#   antagonist        — the boss character who taunts and creates pressure
#   guide_npc         — the in-world hint mechanic character
#   macguffin         — the objective that narratively motivates every problem
#   variable_skin     — what the unknown variable(s) represent in this world
#                       (the LLM must NEVER use a bare letter like "x"; use
#                       this label instead)
#   obstacle_theme    — how equations are physically represented in the world
#   failure_state     — exact narrative consequence when an invariant is
#                       violated (used verbatim by the orchestrator persona)
#
# DO NOT reorder or delete the "general_math" entry — it must be last and
# must have an empty preference_keywords list so it serves as the fallback.

