# domain-registry.yaml — Multi-domain registry for Project Lumina
#
# version: 1.0.0
# last_updated: 2026-03-20
#
# Maps each domain_id to its runtime-config.yaml path.
# Set LUMINA_DOMAIN_REGISTRY_PATH to this file to enable multi-domain routing.
# When a domain registry is active, requests specify domain_id to select a domain.
#
# See: standards/domain-registry-schema-v1.json

# Fallback domain for unauthenticated (anonymous) sessions.
# Set this to a "welcome" or "landing" domain pack when one exists.
# Defaults to default_domain when absent.
unauthenticated_domain: education

# Fallback domain for authenticated users whose role is not listed in
# role_defaults below.
default_domain: education

# Role-based default: when NLP routing returns no confident match, authenticated
# users with these roles are routed to the specified domain instead of the global
# default_domain.  Roles not listed fall through to default_domain.
#
# Design rationale: system-level operators (root, it_support) should land in the
# system domain so they can query Lumina internals without being dropped into a
# domain-specific session (e.g. education).  The global default_domain is kept
# as education to mask system internals from domain-level users.
#
# domain_authority users are routed to the domain matching their first
# governed_modules entry (via module_prefix resolution), so a teacher whose JWT
# carries domain/edu/… lands in education, not the system domain.
role_defaults:
  root: system
  it_support: system

domains:
  education:
    runtime_config_path: domain-packs/education/cfg/runtime-config.yaml
    label: Education — Algebra Level 1
    description: K-12 algebra tutoring domain with scaffolded problem solving.
    module_prefix: edu
    keywords:
      - algebra
      - equation
      - math
      - solve
      - variable
      - tutoring

  agriculture:
    runtime_config_path: domain-packs/agriculture/cfg/runtime-config.yaml
    label: Agriculture — Operations Level 1
    description: Agricultural operations monitoring and variance reporting.
    module_prefix: agri
    keywords:
      - crop
      - yield
      - soil
      - harvest
      - irrigation
      - agriculture

  system:
    runtime_config_path: domain-packs/system/cfg/runtime-config.yaml
    label: System — Lumina Infrastructure
    description: System domain for Project Lumina infrastructure queries. Routes admin and operator questions about System Log records, domain physics, RBAC, policy gates, and Lumina operational concepts. Only root and it_support roles may execute sessions in this domain.
    module_prefix: sys
    keywords:
      - ctl
      - ledger
      - commitment
      - trace event
      - escalation
      - standing order
      - invariant
      - system physics
      - domain physics
      - domain pack
      - domain authority
      - meta authority
      - domain registry
      - pseudonymous
      - rbac
      - tool adapter
      - orchestrator
      - domain lib
      - policy gate
      - audit
      - hash chain
      - physics schema
