# operator-profile.yaml — System-operator entity profile template
# Copied to cfg/profiles/{user_id}/system.yaml on first system domain session.
# operator_id and display_name are populated at runtime from the user's JWT sub.
# Real operator state is not tracked across sessions the way learner state is.
# ============================================================

operator_id: null
domain_id: "domain/sys/system-core/v1"
display_name: null

preferences:
  explanation_style: technical
  language: en

# System domain does not track learning/ZPD state.
# The state dict kept in session is intentionally minimal.
state: {}
