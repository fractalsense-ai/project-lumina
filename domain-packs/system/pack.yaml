# ─── System Domain Pack Manifest ──────────────────────────────────────
# HMVC identity card — declares what this pack is, what it owns,
# and how its components map to the Model / Controller / View layers.
# See docs/7-concepts/hmvc-heritage.md for the architectural rationale.
# ──────────────────────────────────────────────────────────────────────

pack_id: system
version: "0.1.0"
description: >-
  Read-only introspection surface for the Lumina OS runtime.
  Provides admin commands, log inspection, and health monitoring
  for root and it_support operators. Local-only — no external LLM.

# ── HMVC Layer Map ────────────────────────────────────────────────────
layers:
  model:
    - modules/system-core/domain-physics.json
  controller:
    - controllers/runtime_adapters.py
    - controllers/tool_adapters.py
    - controllers/manifest_integrity.py
    - controllers/verify_repo.py
    - controllers/yaml_converter.py
    - controllers/system_log_validator.py
    - controllers/security_freeze.py
    - controllers/ppa_demo.py
    - controllers/logic_scraper.py
  domain_lib:
    - domain-lib/system_health.py
    - domain-lib/sensors/hw_disk.py
    - domain-lib/sensors/hw_memory.py
    - domain-lib/sensors/hw_temp.py
    - domain-lib/sensors/hw_gpu.py
    - domain-lib/sensors/hw_loop_latency.py
    - domain-lib/sensors/hw_http_queue.py
    - domain-lib/reference/turn-interpretation-spec-v1.md
    - domain-lib/reference/command-interpreter-spec-v1.md
  view:
    - prompts/domain-persona-v1.md
  docs:
    - docs/

# ── Modules ───────────────────────────────────────────────────────────
modules:
  - system-core

# ── Entry Points ──────────────────────────────────────────────────────
entry_points:
  runtime_config: cfg/runtime-config.yaml
  runtime_adapter: controllers/runtime_adapters.py
